function buildProgram(session,level,duration){
  const bank=BANK[session];
  const cfg={
    45:{warmup:5, cN:2,cS:3,iN:1,iS:2,fin:false,finMin:0},
    60:{warmup:8, cN:2,cS:3,iN:2,iS:2,fin:true, finMin:8},
    90:{warmup:10,cN:3,cS:4,iN:2,iS:3,fin:true, finMin:12},
    120:{warmup:10,cN:3,cS:4,iN:3,iS:3,fin:true, finMin:18},
  }[duration];
  const rep={
    debutant:     {c:"12–15",i:"15–20",rc:75, ri:45},
    intermediaire:{c:"8–12", i:"12–15",rc:90, ri:60},
    expert:       {c:"5–8",  i:"10–12",rc:120,ri:75},
  }[level];
  const phases=[];
  phases.push({name:"Échauffement",dur:`${cfg.warmup} min`,exs:[{name:"Cardio léger + mobilité",sets:1,reps:`${cfg.warmup} min`,rest:0,isSimple:true,tip:level==="debutant"?"Vélo ou marche rapide, FC 110–120 bpm — tu dois pouvoir parler.":"Rameur FC 120–130 bpm + quelques mouvements de mobilité articulaire.",how:[],alts:[]}]});
  phases.push({name:"Compound",dur:`~${Math.round(cfg.cN*cfg.cS*(rep.rc/60+1))} min`,exs:bank.compound[level].slice(0,cfg.cN).map(e=>({...e,sets:cfg.cS,reps:rep.c,rest:rep.rc}))});
  phases.push({name:"Isolation",dur:`~${Math.round(cfg.iN*cfg.iS*(rep.ri/60+0.75))} min`,exs:bank.isolation[level].slice(0,cfg.iN).map(e=>({...e,sets:cfg.iS,reps:rep.i,rest:rep.ri}))});
  if(cfg.fin){const f=bank.finisher[level];phases.push({name:"Finisher",dur:`${cfg.finMin} min`,exs:[{name:f.name,tip:f.tip,sets:1,reps:`${cfg.finMin} min`,rest:0,isSimple:true,how:[],alts:[]}]});}
  return phases;
}


// ─── Rest Timer ───────────────────────────────────────────────────────────────
function RestTimer({seconds,onDone,accent}){
  const endRef=useRef(Date.now()+seconds*1000);
  const [left,setLeft]=useState(seconds);
  const tRef=useRef();
  const tick=useCallback(()=>{
    const rem=Math.max(0,Math.ceil((endRef.current-Date.now())/1000));
    setLeft(rem);
    if(rem<=0){onDone();return;}
    tRef.current=setTimeout(tick,250);
  },[onDone]);
  useEffect(()=>{
    tRef.current=setTimeout(tick,100);
    const f=()=>{if(!document.hidden){clearTimeout(tRef.current);tick();}};
    document.addEventListener('visibilitychange',f);
    return()=>{clearTimeout(tRef.current);document.removeEventListener('visibilitychange',f);};
  },[tick]);
  const pct=(seconds-left)/seconds;
  const r=18,circ=2*Math.PI*r;
  const col=left<=3&&left>0?"#E03030":accent;
  return(
    <div className="fu" style={{marginTop:10,borderRadius:14,padding:"10px 14px",background:col+"14",border:`1.5px solid ${col}33`,display:"flex",alignItems:"center",gap:12}}>
      <div style={{position:"relative",width:44,height:44,flexShrink:0}}>
        <svg width={44} height={44} viewBox="0 0 44 44" style={{transform:"rotate(-90deg)"}}>
          <circle cx={22} cy={22} r={r} fill="none" stroke={col+"22"} strokeWidth={3}/>
          <circle cx={22} cy={22} r={r} fill="none" stroke={col} strokeWidth={3}
            strokeDasharray={String(circ)} strokeDashoffset={String(circ*(1-pct))}
            style={{transition:"stroke-dashoffset 0.25s linear"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Bebas Neue'",fontSize:15,color:col,lineHeight:1}}>{left}</div>
      </div>
      <div style={{flex:1}}>
        <div style={{fontSize:9,color:col,letterSpacing:2,fontWeight:600,marginBottom:2}}>RÉCUPÉRATION</div>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:22,color:col,letterSpacing:1,lineHeight:1}}>{left}s</div>
      </div>
      <button onClick={onDone} style={{background:"white",border:`1.5px solid ${col}33`,borderRadius:10,padding:"5px 12px",color:col,fontSize:11,cursor:"pointer",fontWeight:700}}>Skip</button>
    </div>
  );
}

// ─── Weight Chart ──────────────────────────────────────────────────────────────
function WeightChart({entries,goal,color,cardBg,textSub,borderCol}){
  if(!entries||entries.length===0)return(
    <div style={{textAlign:"center",padding:"24px",color:textSub,fontSize:12}}>
      Ajoute ton premier poids pour voir la courbe.
    </div>
  );
  const W=320,H=140,pL=36,pR=20,pT=12,pB=24;
  const sorted=[...entries].sort((a,b)=>a.date.localeCompare(b.date));
  const ws=sorted.map(e=>e.weight),allW=[...ws,goal];
  const minW=Math.floor(Math.min(...allW)-1),maxW=Math.ceil(Math.max(...allW)+1);
  const xs=i=>sorted.length===1?pL+(W-pL-pR)/2:pL+(W-pL-pR)*(i/(sorted.length-1));
  const ys=w=>pT+(H-pT-pB)*(1-(w-minW)/(maxW-minW));
  const pts=sorted.map((e,i)=>({x:xs(i),y:ys(e.weight),w:e.weight,d:e.date}));
  const pd=pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const fd=d=>{const p=d.split("-");return`${p[2]}/${p[1]}`;};
  const gy=ys(goal);
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
      <defs>
        <linearGradient id="wgrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color}/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {[minW,Math.round((minW+maxW)/2),maxW].map(t=>(
        <g key={t}>
          <line x1={pL} y1={ys(t)} x2={W-pR} y2={ys(t)} stroke={borderCol} strokeWidth={1}/>
          <text x={pL-4} y={ys(t)+4} textAnchor="end" style={{fontSize:8,fill:textSub}}>{t}</text>
        </g>
      ))}
      <line x1={pL} y1={gy} x2={W-pR} y2={gy} stroke={color} strokeWidth={1.5} strokeDasharray="5,3" opacity={0.5}/>
      <text x={W-pR+3} y={gy+4} style={{fontSize:8,fill:color}}>Obj</text>
      {pts.length>1&&<path d={`${pd} L${pts[pts.length-1].x},${H-pB} L${pts[0].x},${H-pB} Z`} fill="url(#wgrad)" opacity={0.15}/>}
      {pts.length>1&&<path d={pd} fill="none" stroke={color} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>}
      {pts.map((p,i)=>(
        <g key={i}>
          <circle cx={p.x} cy={p.y} r={5} fill={cardBg} stroke={color} strokeWidth={2.5}/>
          <circle cx={p.x} cy={p.y} r={2} fill={color}/>
          <text x={p.x} y={p.y-9} textAnchor="middle" style={{fontSize:8,fill:textSub}}>{p.w}</text>
          {(i===0||i===pts.length-1||pts.length<=4)&&
            <text x={p.x} y={H-pB+13} textAnchor="middle" style={{fontSize:7,fill:textSub}}>{fd(p.d)}</text>}
        </g>
      ))}
    </svg>
  );
}

// ─── Progression ──────────────────────────────────────────────────────────────
function Progression({profileId,th}){
  const def=PROFS[profileId];
  const sK=`af_prog_${profileId}`,cK=`af_cfg_${profileId}`;
  const [entries,setEntries]=useState(()=>LS.get(sK,[]));
  const [cfg,setCfg]=useState(()=>LS.get(cK,{goal:def.goal}));
  const [nW,setNW]=useState("");
  const [nD,setND]=useState(()=>new Date().toISOString().split("T")[0]);
  const [editG,setEditG]=useState(false);
  const [gIn,setGIn]=useState(String(cfg.goal||def.goal));
  const {accent,cardBg,pageBg,textMain,textSub,border:borderCol}=th;
  const save=e=>{setEntries(e);LS.set(sK,e);};
  const add=()=>{const w=parseFloat(nW);if(isNaN(w)||w<20||w>300)return;save([...entries.filter(e=>e.date!==nD),{date:nD,weight:w}]);setNW("");};
  const del=d=>save(entries.filter(e=>e.date!==d));
  const saveG=()=>{const g=parseFloat(gIn);if(isNaN(g))return;const nc={...cfg,goal:g};setCfg(nc);LS.set(cK,nc);setEditG(false);};
  const sorted=[...entries].sort((a,b)=>b.date.localeCompare(a.date));
  const latest=sorted[0];
  const first=entries.length>0?[...entries].sort((a,b)=>a.date.localeCompare(b.date))[0]:null;
  const diff=latest&&first?+(latest.weight-first.weight).toFixed(1):null;
  const toGoal=latest?(+(latest.weight-(cfg.goal||def.goal)).toFixed(1)):null;
  const card={background:cardBg,borderRadius:20,padding:16,border:`2px solid ${borderCol}`,boxShadow:"0 2px 12px rgba(0,0,0,0.05)",marginBottom:12};
  return(
    <div style={{padding:"0 16px 40px",maxWidth:480,margin:"0 auto"}}>
      {/* Stats row */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}} className="fu">
        {[
          {l:"ACTUEL",v:latest?`${latest.weight}kg`:"–",c:accent},
          {l:"ÉCART",v:diff!==null?(diff>0?`+${diff}`:diff)+"kg":"–",c:diff!==null&&diff<0?"#22BB60":diff>0?"#E03030":textSub},
          {l:"OBJECTIF",v:`${cfg.goal||def.goal}kg`,c:textSub},
        ].map(s=>(
          <div key={s.l} style={{...card,padding:"12px 10px",textAlign:"center",marginBottom:0}}>
            <div style={{fontSize:8,letterSpacing:2,color:textSub,marginBottom:4,fontWeight:600}}>{s.l}</div>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:22,color:s.c,letterSpacing:1}}>{s.v}</div>
          </div>
        ))}
      </div>
      {/* Goal edit */}
      <div style={{marginBottom:12,display:"flex",alignItems:"center",gap:8}} className="fu">
        {editG?(
          <>
            <input type="number" value={gIn} onChange={e=>setGIn(e.target.value)} style={{flex:1,background:pageBg,border:`2px solid ${accent}`,borderRadius:12,padding:"9px 12px",color:textMain,fontSize:13,outline:"none"}}/>
            <button onClick={saveG} style={{padding:"9px 16px",borderRadius:12,background:accent,border:"none",color:"#fff",fontSize:12,cursor:"pointer",fontWeight:700}}>OK</button>
            <button onClick={()=>setEditG(false)} style={{padding:"9px 12px",borderRadius:12,background:borderCol,border:"none",color:textSub,cursor:"pointer",fontSize:11}}>✕</button>
          </>
        ):(
          <button onClick={()=>setEditG(true)} style={{background:cardBg,border:`2px solid ${borderCol}`,borderRadius:12,padding:"8px 14px",cursor:"pointer",fontSize:11,color:accent,fontWeight:700,display:"flex",alignItems:"center",gap:5}}>
            <span>✎</span><span>Objectif · {cfg.goal||def.goal}kg</span>
          </button>
        )}
        {toGoal!==null&&<div style={{fontSize:11,color:textSub,marginLeft:"auto",fontWeight:600}}>{toGoal>0?`−${toGoal}kg`:"Objectif atteint !"}</div>}
      </div>
      {/* Chart */}
      <div style={card} className="fu">
        <div style={{fontSize:9,letterSpacing:2,color:textSub,marginBottom:12,fontWeight:700}}>COURBE DE POIDS</div>
        <WeightChart entries={entries} goal={cfg.goal||def.goal} color={def.profileColor} cardBg={cardBg} textSub={textSub} borderCol={borderCol}/>
      </div>
      {/* Add */}
      <div style={card} className="fu">
        <div style={{fontSize:9,letterSpacing:2,color:textSub,marginBottom:10,fontWeight:700}}>AJOUTER UN POIDS</div>
        <div style={{display:"flex",gap:6}}>
          <input type="date" value={nD} onChange={e=>setND(e.target.value)} style={{flex:1,background:pageBg,border:`2px solid ${borderCol}`,borderRadius:12,padding:"9px 10px",color:textMain,fontSize:12,outline:"none"}}/>
          <input type="number" placeholder="kg" value={nW} onChange={e=>setNW(e.target.value)} style={{width:72,background:pageBg,border:`2px solid ${borderCol}`,borderRadius:12,padding:"9px 8px",color:textMain,fontSize:14,textAlign:"center",outline:"none"}}/>
          <button onClick={add} style={{padding:"9px 16px",borderRadius:12,background:accent,border:"none",color:"#fff",fontFamily:"'Bebas Neue'",fontSize:18,cursor:"pointer",boxShadow:`0 4px 12px ${accent}33`}}>+</button>
        </div>
      </div>
      {/* History */}
      {sorted.length>0&&(
        <div style={card} className="fu">
          <div style={{fontSize:9,letterSpacing:2,color:textSub,marginBottom:10,fontWeight:700}}>HISTORIQUE</div>
          {sorted.slice(0,10).map((e,i)=>(
            <div key={e.date} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:i<sorted.length-1?`1.5px solid ${borderCol}`:"none"}}>
              <div style={{fontSize:11,color:textSub,fontWeight:500}}>{new Date(e.date+"T12:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"})}</div>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:20,color:accent,letterSpacing:1}}>{e.weight} kg</div>
              <button onClick={()=>del(e.date)} style={{background:"none",border:"none",color:borderCol,cursor:"pointer",fontSize:18,padding:"0 4px",lineHeight:1}}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── Workout ──────────────────────────────────────────────────────────────────
function Workout({session,level,duration,onBack,th}){
  const [elapsed,setElapsed]=useState(0);
  const [running,setRunning]=useState(false);
  const startRef=useRef(null),savedRef=useRef(0),ivRef=useRef(),wlRef=useRef(null);
  const {accent,cardBg,pageBg,textMain,textSub,border:borderCol,btnText}=th;
  const reqWL=async()=>{try{if('wakeLock' in navigator)wlRef.current=await navigator.wakeLock.request('screen');}catch(e){}};
  const relWL=()=>{try{if(wlRef.current){wlRef.current.release();wlRef.current=null;}}catch(e){}};
  useEffect(()=>{
    const f=()=>{if(!document.hidden&&running)reqWL();};
    document.addEventListener('visibilitychange',f);
    return()=>{document.removeEventListener('visibilitychange',f);relWL();};
  },[running]);
  const toggleRun=()=>{
    setRunning(p=>{const n=!p;if(n){startRef.current=Date.now()-savedRef.current*1000;reqWL();}else{savedRef.current=elapsed;clearInterval(ivRef.current);relWL();}return n;});
  };
  useEffect(()=>{
    if(!running)return;
    ivRef.current=setInterval(()=>setElapsed(Math.floor((Date.now()-startRef.current)/1000)),500);
    const f=()=>{if(!document.hidden&&startRef.current)setElapsed(Math.floor((Date.now()-startRef.current)/1000));};
    document.addEventListener('visibilitychange',f);
    return()=>{clearInterval(ivRef.current);document.removeEventListener('visibilitychange',f);};
  },[running]);
  const phases=useMemo(()=>buildProgram(session,level,duration),[session,level,duration]);
  const fmt=s=>`${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor((s%3600)/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const S=SESSIONS[session];
  const L=LEVELS.find(l=>l.key===level);

  // Phase colors — always vivid regardless of theme
  const phaseColors=["#FF6B00","#E0306A","#2A8AE0","#22AA70"];

  return(
    <div style={{minHeight:"100vh",background:pageBg,paddingBottom:80}}>
      {/* Sticky header */}
      <div style={{position:"sticky",top:0,zIndex:100,background:pageBg,borderBottom:`2px solid ${borderCol}`,padding:"12px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,maxWidth:480,margin:"0 auto"}}>
          <button onClick={onBack} style={{background:cardBg,border:`2px solid ${borderCol}`,borderRadius:12,padding:"7px 14px",color:textSub,fontSize:12,cursor:"pointer",fontWeight:700}}>← Retour</button>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              <span style={{fontFamily:"'Bebas Neue'",fontSize:20,letterSpacing:2,color:accent}}>{S.label}</span>
              <span style={{background:`${accent}18`,borderRadius:20,padding:"2px 10px",fontSize:9,color:accent,fontWeight:700}}>{L.label}</span>
              <span style={{background:borderCol,borderRadius:20,padding:"2px 10px",fontSize:9,color:textSub,fontWeight:700}}>{duration} min</span>
            </div>
            <div style={{fontSize:10,color:textSub,fontWeight:500}}>{S.sub}</div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:20,letterSpacing:2,color:running?accent:borderCol}}>{fmt(elapsed)}</div>
            <button onClick={toggleRun} style={{fontSize:10,padding:"4px 12px",borderRadius:8,border:`2px solid ${running?accent:borderCol}`,background:running?accent:cardBg,color:running?"#fff":textSub,cursor:"pointer",fontWeight:700,transition:"all 0.2s"}}>{running?"Pause":"Start"}</button>
          </div>
        </div>
      </div>

      {/* Phase content */}
      <div style={{padding:"14px 16px",maxWidth:480,margin:"0 auto"}}>
        {phases.map((phase,pi)=>{
          const pc=phaseColors[pi%phaseColors.length];
          return(
            <div key={pi} style={{marginBottom:24}} className="fu">
              {/* Phase header — colored pill */}
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                <div style={{
                  display:"inline-flex",alignItems:"center",gap:8,
                  background:`linear-gradient(135deg,${pc},${pc}CC)`,
                  borderRadius:20,padding:"6px 14px",
                  boxShadow:`0 4px 14px ${pc}44`}}>
                  <div style={{fontFamily:"'Bebas Neue'",fontSize:14,color:"#fff",letterSpacing:3}}>{phase.name}</div>
                </div>
                <div style={{flex:1,height:1.5,background:borderCol}}/>
                <div style={{fontSize:10,color:textSub,fontWeight:600}}>{phase.dur}</div>
              </div>
              {phase.exs.map((ex,ei)=>(
                <ExCard key={`${pi}-${ei}`} ex={ex}
                  accent={pc} cardBg={cardBg} pageBg={pageBg}
                  textMain={textMain} textSub={textSub} borderCol={borderCol}/>
              ))}
            </div>
          );
        })}

        {/* Nutrition tip */}
        <div style={{background:`linear-gradient(135deg,${accent}18,${accent}08)`,borderRadius:20,padding:16,border:`2px solid ${accent}33`,marginTop:4}}>
          <div style={{fontSize:9,letterSpacing:2,color:accent,marginBottom:6,fontWeight:700}}>NUTRITION</div>
          <div style={{fontSize:12,color:textSub,lineHeight:1.7}}>
            {level==="debutant"?"1.6–1.8g de protéines/kg. La progression passe avant la restriction calorique.":level==="intermediaire"?"Vise −350 kcal/jour. 1.8–2g de protéines/kg.":"Maintien calorique ±100 kcal + 2–2.2g protéines/kg. Glucides autour des séances."}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Profil Screen ─────────────────────────────────────────────────────────────
function ProfilScreen({activeProfile,onSwitch,th}){
  const {accent,cardBg,textMain,textSub,border:borderCol}=th;
  return(
    <div style={{padding:"16px 16px 100px",maxWidth:480,margin:"0 auto"}}>
      <div style={{fontSize:9,letterSpacing:3,color:textSub,marginBottom:14,fontWeight:700}} className="fu">PROFILS</div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {Object.values(PROFS).map(p=>{
          const active=activeProfile===p.id;
          return(
            <button key={p.id} onClick={()=>onSwitch(p.id)} className="pi" style={{
              display:"flex",alignItems:"center",gap:16,
              padding:"18px 16px",cursor:"pointer",textAlign:"left",
              borderRadius:20,
              border:`2px solid ${active?p.profileColor:borderCol}`,
              background:active?`linear-gradient(135deg,${p.profileColor}18,${p.profileColor}06)`:cardBg,
              transition:"all 0.25s",
              transform:active?"scale(1.02)":"scale(1)",
              boxShadow:active?`0 6px 20px ${p.profileColor}22`:"0 2px 10px rgba(0,0,0,0.05)"}}>
              <div style={{
                width:52,height:52,borderRadius:18,
                background:`linear-gradient(135deg,${p.profileColor},${p.profileColor}88)`,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontFamily:"'Bebas Neue'",fontSize:18,color:"#fff",letterSpacing:1,
                flexShrink:0,boxShadow:active?`0 4px 14px ${p.profileColor}44`:"none"}}>
                {p.name.slice(0,3).toUpperCase()}
              </div>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:2,color:active?p.profileColor:textMain}}>{p.name}</div>
                <div style={{fontSize:11,color:textSub,marginTop:2,fontWeight:500}}>Objectif : {p.goal}kg · {LEVELS.find(l=>l.key===p.level).label}</div>
              </div>
              {active&&<div style={{width:10,height:10,borderRadius:"50%",background:p.profileColor,boxShadow:`0 0 10px ${p.profileColor}`}}/>}
            </button>
          );
        })}
      </div>
      <div style={{marginTop:20,background:cardBg,borderRadius:20,padding:16,border:`2px solid ${borderCol}`,borderLeft:`4px solid ${accent}`}} className="fu">
        <div style={{fontSize:9,letterSpacing:2,color:accent,marginBottom:6,fontWeight:700}}>INFO</div>
        <div style={{fontSize:11,color:textSub,lineHeight:1.7}}>Chaque profil a son propre historique de poids et ses préférences. Données sauvegardées sur cet appareil.</div>
      </div>
    </div>
  );
}

// ─── Bottom Nav ────────────────────────────────────────────────────────────────
function Nav({tab,setTab,th}){
  const {accent,pageBg,textSub,border:borderCol}=th;
  const items=[{key:"seance",label:"Séance"},{key:"progression",label:"Poids"},{key:"profil",label:"Profil"}];
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:200,background:pageBg,borderTop:`2px solid ${borderCol}`,display:"flex"}}>
      {items.map(it=>{
        const active=tab===it.key;
        return(
          <button key={it.key} onClick={()=>setTab(it.key)} style={{
            flex:1,padding:"11px 4px 14px",background:"transparent",
            border:"none",cursor:"pointer",
            display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
            <span style={{
              fontSize:9,letterSpacing:2,fontWeight:active?700:500,
              color:active?accent:textSub,transition:"color 0.2s"}}>
              {it.label.toUpperCase()}
            </span>
            {active&&<div style={{width:22,height:3,borderRadius:2,background:accent,boxShadow:`0 0 6px ${accent}88`}}/>}
          </button>
        );
      })}
    </div>
  );
}

// ─── Theme Panel ──────────────────────────────────────────────────────────────
const PRESETS=[
  {name:"Soleil",    pageBg:"#FFF8F2",cardBg:"#FFFFFF",accent:"#FF6B00",btnText:"#FFFFFF",textMain:"#1A1008",textSub:"#9A7060",border:"#F0E0D0"},
  {name:"Doré",      pageBg:"#FFFDF0",cardBg:"#FFFFFF",accent:"#CC8800",btnText:"#FFFFFF",textMain:"#1A1400",textSub:"#8A7040",border:"#F0E8C0"},
  {name:"Rosé",      pageBg:"#FFF2F6",cardBg:"#FFFFFF",accent:"#E0306A",btnText:"#FFFFFF",textMain:"#1A0810",textSub:"#9A5070",border:"#F0D0DA"},
  {name:"Menthe",    pageBg:"#F2FFF8",cardBg:"#FFFFFF",accent:"#1A9A6A",btnText:"#FFFFFF",textMain:"#081A10",textSub:"#508A70",border:"#C8F0E0"},
  {name:"Ciel",      pageBg:"#F2F8FF",cardBg:"#FFFFFF",accent:"#1A6AE0",btnText:"#FFFFFF",textMain:"#080C1A",textSub:"#507090",border:"#C8D8F0"},
  {name:"Lavande",   pageBg:"#F8F2FF",cardBg:"#FFFFFF",accent:"#8040E0",btnText:"#FFFFFF",textMain:"#0C081A",textSub:"#705090",border:"#E0C8F8"},
  {name:"Sombre",    pageBg:"#14141C",cardBg:"#1E1E28",accent:"#FF6B00",btnText:"#FFFFFF",textMain:"#FFFFFF",textSub:"#88889A",border:"#2C2C3C"},
  {name:"Nuit",      pageBg:"#0A0E1A",cardBg:"#141820",accent:"#4A8AFF",btnText:"#FFFFFF",textMain:"#FFFFFF",textSub:"#6080A0",border:"#1E2840"},
  {name:"Crème",     pageBg:"#FAF7F0",cardBg:"#FFFFFF",accent:"#AA7040",btnText:"#FFFFFF",textMain:"#1A1208",textSub:"#8A7060",border:"#EAE0D0"},
];

function ThemePanel({onClose,th,setTh}){
  const [local,setLocal]=useState({...th});
  const apply=p=>setLocal({...p});
  const confirm=()=>{setTh({...local});LS.set("af_theme",local);onClose();};
  const fields=[
    {key:"pageBg",l:"Fond de page"},
    {key:"cardBg",l:"Fond des cartes"},
    {key:"accent",l:"Couleur accent"},
    {key:"btnText",l:"Texte des boutons"},
    {key:"textMain",l:"Texte principal"},
    {key:"textSub",l:"Texte secondaire"},
    {key:"border",l:"Bordures"},
  ];
  return(
    <div style={{position:"fixed",inset:0,zIndex:999,display:"flex",alignItems:"flex-end",background:"rgba(0,0,0,0.35)"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{
        width:"100%",background:local.pageBg,
        borderRadius:"24px 24px 0 0",
        padding:"8px 16px 36px",
        border:`2px solid ${local.border}`,borderBottom:"none",
        maxHeight:"88vh",display:"flex",flexDirection:"column",
        boxShadow:"0 -8px 40px rgba(0,0,0,0.18)"}}>
        {/* Handle */}
        <div style={{width:36,height:4,borderRadius:2,background:local.border,margin:"10px auto 14px"}}/>
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexShrink:0}}>
          <div>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:3,color:local.accent}}>APPARENCE</div>
            <div style={{fontSize:10,color:local.textSub,fontWeight:500}}>5 taps sur le logo pour ouvrir</div>
          </div>
          <button onClick={confirm} style={{
            padding:"10px 20px",borderRadius:14,
            background:local.accent,border:"none",
            color:local.btnText,fontFamily:"'Bebas Neue'",
            fontSize:15,letterSpacing:1,cursor:"pointer",
            boxShadow:`0 4px 14px ${local.accent}44`}}>
            APPLIQUER
          </button>
        </div>

        <div style={{overflowY:"auto",flex:1}}>
          {/* Presets */}
          <div style={{fontSize:9,letterSpacing:2,color:local.textSub,marginBottom:10,fontWeight:700}}>THÈMES</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:22}}>
            {PRESETS.map(p=>{
              const active=local.accent===p.accent&&local.pageBg===p.pageBg;
              return(
                <button key={p.name} onClick={()=>apply(p)} style={{
                  padding:"10px 6px",borderRadius:16,cursor:"pointer",
                  border:`2px solid ${active?p.accent:p.border}`,
                  background:p.pageBg,
                  transition:"all 0.2s",
                  transform:active?"scale(1.04)":"scale(1)",
                  boxShadow:active?`0 4px 14px ${p.accent}33`:"none"}}>
                  <div style={{display:"flex",gap:4,justifyContent:"center",marginBottom:5}}>
                    {[p.accent,p.cardBg,p.pageBg].map((c,i)=>(
                      <div key={i} style={{width:14,height:14,borderRadius:"50%",background:c,border:`1.5px solid ${p.border}`}}/>
                    ))}
                  </div>
                  <div style={{fontSize:9,color:p.textSub,fontWeight:700,textAlign:"center"}}>{p.name}</div>
                </button>
              );
            })}
          </div>

          {/* Custom */}
          <div style={{fontSize:9,letterSpacing:2,color:local.textSub,marginBottom:10,fontWeight:700}}>PERSONNALISER</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {fields.map(f=>(
              <div key={f.key} style={{
                display:"flex",alignItems:"center",gap:12,
                background:local.cardBg,borderRadius:16,
                padding:"10px 14px",border:`2px solid ${local.border}`}}>
                <input type="color" value={local[f.key]}
                  onChange={e=>setLocal(p=>({...p,[f.key]:e.target.value}))}
                  style={{width:36,height:36,borderRadius:10,border:`2px solid ${local.border}`,cursor:"pointer",padding:2,background:"transparent"}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:local.textMain,fontWeight:600}}>{f.l}</div>
                  <div style={{fontSize:10,color:local.textSub,fontFamily:"monospace"}}>{local[f.key]}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App(){
  const [profile,setProfile]=useState(()=>LS.get("af_profile","miovida"));
  const [tab,setTab]=useState("seance");
  const [workout,setWorkout]=useState(null);
  const [taps,setTaps]=useState(0);
  const [themePanel,setThemePanel]=useState(false);
  const [th,setThRaw]=useState(()=>LS.get("af_theme",DEFAULT_THEME));
  const tapTimer=useRef();
  const P=PROFS[profile];
  const setTh=t=>{setThRaw(t);LS.set("af_theme",t);};

  useEffect(()=>{
    if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
    document.body.style.background=th.pageBg;
  },[th.pageBg]);

  const logoTap=()=>{
    const n=taps+1;setTaps(n);clearTimeout(tapTimer.current);
    if(n>=5){setThemePanel(true);setTaps(0);}
    else tapTimer.current=setTimeout(()=>setTaps(0),1500);
  };
  const switchProfile=id=>{setProfile(id);LS.set("af_profile",id);setTab("seance");setWorkout(null);};

  if(workout) return <Workout {...workout} th={th} onBack={()=>setWorkout(null)}/>;

  return(
    <div style={{minHeight:"100vh",background:th.pageBg}}>
      {/* Header */}
      <div style={{background:th.pageBg,borderBottom:`2px solid ${th.border}`,padding:"18px 16px 14px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",maxWidth:480,margin:"0 auto"}}>
          {/* Logo */}
          <div onClick={logoTap} style={{cursor:"default",userSelect:"none",position:"relative"}}>
            <div style={{height:3,width:32,background:`linear-gradient(90deg,${th.accent},${th.accent}55)`,borderRadius:3,marginBottom:5}}/>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:28,letterSpacing:4,lineHeight:1,color:th.textMain}}>
              ABDELLA<span style={{color:th.accent}}>FIT</span>
            </div>
            {taps>0&&taps<5&&(
              <div style={{position:"absolute",top:-4,right:-12,width:16,height:16,borderRadius:"50%",background:th.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff",fontWeight:700}}>{5-taps}</div>
            )}
          </div>
          {/* Profile button */}
          <button onClick={()=>setTab("profil")} style={{
            display:"flex",alignItems:"center",gap:8,
            padding:"8px 16px",borderRadius:20,
            background:`linear-gradient(135deg,${P.profileColor}18,${P.profileColor}08)`,
            border:`2px solid ${P.profileColor}44`,
            cursor:"pointer",transition:"all 0.2s"}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:P.profileColor,boxShadow:`0 0 6px ${P.profileColor}`}}/>
            <span style={{fontFamily:"'Bebas Neue'",fontSize:14,letterSpacing:2,color:P.profileColor}}>{P.name.toUpperCase()}</span>
          </button>
        </div>
      </div>

      {/* Content */}
      <div style={{paddingTop:8}}>
        {tab==="seance"&&<SessionConfig profileId={profile} th={th} onStart={(s,l,d)=>setWorkout({session:s,level:l,duration:d})}/>}
        {tab==="progression"&&(
          <div>
            <div style={{padding:"16px 16px 14px",maxWidth:480,margin:"0 auto"}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{
                  width:48,height:48,borderRadius:16,
                  background:`linear-gradient(135deg,${P.profileColor},${P.profileColor}AA)`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontFamily:"'Bebas Neue'",fontSize:16,color:"#fff",letterSpacing:1,
                  boxShadow:`0 4px 14px ${P.profileColor}44`}}>
                  {P.name.slice(0,3).toUpperCase()}
                </div>
                <div>
                  <div style={{fontFamily:"'Bebas Neue'",fontSize:24,letterSpacing:2,color:P.profileColor}}>{P.name.toUpperCase()}</div>
                  <div style={{fontSize:10,color:th.textSub,fontWeight:500,letterSpacing:1}}>SUIVI DU POIDS</div>
                </div>
              </div>
            </div>
            <Progression profileId={profile} th={th}/>
          </div>
        )}
        {tab==="profil"&&<ProfilScreen activeProfile={profile} onSwitch={switchProfile} th={th}/>}
      </div>

      <Nav tab={tab} setTab={setTab} th={th}/>
      {themePanel&&<ThemePanel onClose={()=>setThemePanel(false)} th={th} setTh={setTh}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
