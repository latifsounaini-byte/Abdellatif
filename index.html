// ─── PROGRAM BUILDER ────────────────────────────────────────────────────────
function buildProgram(session, level, duration) {
  const bank = BANK[session];
  const cfg = {
    // Débutant : repos 75s compound, 45s iso → compter ~2.5min/set compound, ~1.5min/set iso
    // Intermédiaire : repos 90s → ~3min/set compound, ~2min/set iso
    // Expert : repos 120s → ~3.5min/set compound, ~2min/set iso
    // On vise 80% du temps disponible pour les exercices, 20% pour transitions/setup
    45: {warmup:5,  compoundN:2,compoundSets:3,isolN:1,isolSets:2,hasFinisher:false,finMin:0},
    60: {warmup:8,  compoundN:2,compoundSets:3,isolN:2,isolSets:2,hasFinisher:true, finMin:8},
    90: {warmup:10, compoundN:3,compoundSets:4,isolN:2,isolSets:3,hasFinisher:true, finMin:12},
    120:{warmup:10, compoundN:3,compoundSets:4,isolN:3,isolSets:3,hasFinisher:true, finMin:18},
  }[duration];
  const reps = {
    debutant:      {compound:"12–15",isolation:"15–20",rest:{compound:75, isolation:45}},
    intermediaire: {compound:"8–12", isolation:"12–15",rest:{compound:90, isolation:60}},
    expert:        {compound:"5–8",  isolation:"10–12",rest:{compound:120,isolation:75}},
  }[level];
  const phases = [];
  phases.push({name:"Échauffement",duration:`${cfg.warmup} min`,exercises:[{
    name:"Cardio léger + mobilité",sets:1,reps:`${cfg.warmup} min`,rest:0,isSimple:true,
    tip:level==="debutant"?"Marche rapide ou vélo léger, FC 110–120 bpm":level==="intermediaire"?"Rameur ou vélo, FC 120–130 bpm + mobilité":"Rameur intensité progressive + activation dynamique"
  }]});
  const compounds = bank.compound[level].slice(0,cfg.compoundN).map(ex=>({...ex,sets:cfg.compoundSets,reps:reps.compound,rest:reps.rest.compound}));
  const totalC = Math.round(cfg.compoundN*cfg.compoundSets*(reps.rest.compound/60+1));
  phases.push({name:"Exercices Compound",duration:`~${totalC} min`,exercises:compounds});
  const isos = bank.isolation[level].slice(0,cfg.isolN).map(ex=>({...ex,sets:cfg.isolSets,reps:reps.isolation,rest:reps.rest.isolation}));
  const totalI = Math.round(cfg.isolN*cfg.isolSets*(reps.rest.isolation/60+0.75));
  phases.push({name:"Isolation & Finition",duration:`~${totalI} min`,exercises:isos});
  if(cfg.hasFinisher){
    const fin=bank.finisher[level];
    phases.push({name:"Finisher",duration:`${cfg.finMin} min`,exercises:[{
      name:fin.name, tip:fin.tip,
      sets:1, reps:`${cfg.finMin} min`, rest:0, isSimple:true
    }]});
  }
  return phases;
}

// ─── AUDIO ENGINE ────────────────────────────────────────────────────────────
// Keeps iOS JS alive in background via silent audio loop + plays beep on done
const AudioEngine = (()=>{
  let ctx = null;
  let silentSource = null;
  let keepAliveInterval = null;

  function getCtx(){
    if(!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)();
    return ctx;
  }

  // Play a silent buffer on repeat — tricks iOS into keeping JS alive
  function startKeepAlive(){
    try{
      const ac = getCtx();
      if(ac.state === 'suspended') ac.resume();

      // Create a tiny silent buffer and loop it
      const buf = ac.createBuffer(1, ac.sampleRate * 0.5, ac.sampleRate);
      const src = ac.createBufferSource();
      src.buffer = buf;
      src.loop = true;
      src.connect(ac.destination);
      src.start();
      silentSource = src;

      // Also ping every 20s to prevent suspension
      keepAliveInterval = setInterval(()=>{
        if(ac.state === 'suspended') ac.resume();
      }, 20000);
    }catch(e){}
  }

  function stopKeepAlive(){
    try{
      if(silentSource){ silentSource.stop(); silentSource = null; }
      clearInterval(keepAliveInterval);
    }catch(e){}
  }

  // Short beep: frequency, duration in ms
  function beep(freq=880, dur=300, vol=0.4){
    try{
      const ac = getCtx();
      if(ac.state==='suspended') ac.resume();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(vol, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur/1000);
      osc.start(); osc.stop(ac.currentTime + dur/1000);
    }catch(e){}
  }

  // Triple beep = "rest over, go!"
  function restDoneSound(){
    beep(660, 150, 0.3);
    setTimeout(()=>beep(880, 150, 0.3), 180);
    setTimeout(()=>beep(1100, 300, 0.5), 360);
  }

  // countdown beep for last 3 seconds
  function countdownBeep(){ beep(440, 100, 0.2); }

  return { startKeepAlive, stopKeepAlive, restDoneSound, countdownBeep, getCtx };
})();

// ─── NOTIFICATION HELPER ─────────────────────────────────────────────────────
function fireNotif(title, body){
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  try{
    if(navigator.serviceWorker?.controller){
      navigator.serviceWorker.controller.postMessage({type:'SHOW_NOTIF',title,body});
    } else {
      new Notification(title,{body,icon:'/icon.png',badge:'/icon.png'});
    }
  }catch(e){}
}

// ─── REST TIMER ──────────────────────────────────────────────────────────────
function RestTimer({seconds, onDone, exerciseName}){
  const endRef = useRef(Date.now() + seconds * 1000);
  const [left, setLeft] = useState(seconds);
  const tickRef = useRef();
  const beepedRef = useRef(new Set()); // track which countdown seconds already beeped

  const tick = useCallback(()=>{
    const rem = Math.max(0, Math.ceil((endRef.current - Date.now()) / 1000));
    setLeft(rem);

    // Countdown beeps for last 3 seconds
    if(rem <= 3 && rem > 0 && !beepedRef.current.has(rem)){
      beepedRef.current.add(rem);
      AudioEngine.countdownBeep();
    }

    if(rem <= 0){
      AudioEngine.restDoneSound();
      fireNotif('⏱️ Repos terminé !', exerciseName ? `C'est reparti sur : ${exerciseName} 💪` : 'C\'est reparti !');
      onDone();
      return;
    }
    tickRef.current = setTimeout(tick, 250);
  },[onDone, exerciseName]);

  useEffect(()=>{
    // Unlock audio on mount (iOS requires user gesture — timer start IS the gesture)
    AudioEngine.getCtx();
    // Start silent keep-alive so iOS doesn't pause JS
    AudioEngine.startKeepAlive();
    tickRef.current = setTimeout(tick, 100);
    const onVis = ()=>{ if(!document.hidden){ clearTimeout(tickRef.current); tick(); }};
    document.addEventListener('visibilitychange', onVis);
    return()=>{
      clearTimeout(tickRef.current);
      document.removeEventListener('visibilitychange', onVis);
      AudioEngine.stopKeepAlive();
    };
  },[tick]);

  const pct=(seconds-left)/seconds, r=22, circ=2*Math.PI*r;
  const isLast3 = left <= 3 && left > 0;
  return(
    <div style={{display:"flex",alignItems:"center",gap:14,background:`linear-gradient(135deg,#2A1508,#1C0F05)`,border:`1px solid ${isLast3?C.terra:C.orange}88`,borderRadius:12,padding:"10px 16px",marginTop:10,transition:"border-color 0.3s"}}>
      <svg width={54} height={54} viewBox="0 0 54 54">
        <circle cx={27} cy={27} r={r} fill="none" stroke={C.border} strokeWidth={4}/>
        <circle cx={27} cy={27} r={r} fill="none" stroke={isLast3?C.terra:C.orange} strokeWidth={4} strokeDasharray={String(circ)} strokeDashoffset={String(circ*(1-pct))} transform="rotate(-90 27 27)" style={{transition:"stroke-dashoffset 0.25s linear"}}/>
        <text x={27} y={32} textAnchor="middle" style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,fill:isLast3?C.terra:C.cream}}>{left}</text>
      </svg>
      <div>
        <div style={{fontSize:11,color:C.muted,letterSpacing:1}}>RÉCUPÉRATION</div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:isLast3?C.terra:C.orange,letterSpacing:2}}>{left}s</div>
      </div>
      <button onClick={()=>{AudioEngine.stopKeepAlive();onDone();}} style={{marginLeft:"auto",background:"transparent",border:`1px solid ${C.borderHi}`,color:C.muted,borderRadius:8,padding:"4px 12px",cursor:"pointer",fontSize:12}}>Skip</button>
    </div>
  );
}

function ExerciseCard({ex,color,musicMode}){
  const [done,setDone]=useState(new Array(ex.sets).fill(false));
  const [timer,setTimer]=useState(null);
  const toggle=i=>{const next=[...done];next[i]=!next[i];setDone(next);if(next[i]&&ex.rest>0)setTimer(ex.rest);};
  const allDone=done.every(Boolean);
  return(
    <div style={{background:allDone?`linear-gradient(135deg,${color}18,${color}08)`:`linear-gradient(135deg,${C.card},#1A1008)`,border:`1px solid ${allDone?color+"66":C.border}`,borderLeft:`3px solid ${allDone?color:C.borderHi}`,borderRadius:12,padding:"14px 16px",marginBottom:10,transition:"all 0.35s"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:17,letterSpacing:1,color:allDone?color:C.cream,lineHeight:1.2}}>{ex.name}</div>
          <div style={{fontSize:12,color:C.muted,marginTop:4}}>{ex.sets>1?`${ex.sets} séries × ${ex.reps}`:ex.reps}{ex.rest>0&&<span style={{color:C.dim}}> · {ex.rest}s repos</span>}</div>
          {ex.tip&&<div style={{fontSize:11,color:C.dim,marginTop:5,fontStyle:"italic",lineHeight:1.5,borderLeft:`2px solid ${C.borderHi}`,paddingLeft:8}}>{ex.tip}</div>}
        </div>
        {allDone&&<div style={{width:28,height:28,borderRadius:"50%",background:`linear-gradient(135deg,${color},${color}88)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>✓</div>}
      </div>

        <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
          {done.map((d,i)=>(<button key={i} onClick={()=>toggle(i)} style={{width:42,height:42,borderRadius:10,border:`2px solid ${d?color:C.border}`,background:d?`linear-gradient(135deg,${color}33,${color}18)`:C.surface,color:d?color:C.dim,fontFamily:"'Bebas Neue',sans-serif",fontSize:15,cursor:"pointer",transition:"all 0.2s"}}>S{i+1}</button>))}
        </div>

  );
}

// ─── WEIGHT CHART (SVG) ──────────────────────────────────────────────────────
function WeightChart({entries, goal, color}){
  if(!entries||entries.length===0) return(
    <div style={{textAlign:"center",padding:"32px 0",color:C.dim,fontSize:13}}>
      Aucune donnée encore.<br/>Ajoute ton premier poids ci-dessus.
    </div>
  );
  const W=340, H=160, padL=40, padR=16, padT=16, padB=28;
  const sorted=[...entries].sort((a,b)=>a.date.localeCompare(b.date));
  const weights=sorted.map(e=>e.weight);
  const allW=[...weights, goal];
  const minW=Math.floor(Math.min(...allW)-1), maxW=Math.ceil(Math.max(...allW)+1);
  const xScale=i=>(sorted.length===1)?padL+(W-padL-padR)/2:padL+(W-padL-padR)*(i/(sorted.length-1));
  const yScale=w=>padT+(H-padT-padB)*(1-(w-minW)/(maxW-minW));
  const goalY=yScale(goal);
  const pts=sorted.map((e,i)=>({x:xScale(i),y:yScale(e.weight),w:e.weight,date:e.date}));
  const pathD=pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const yTicks=[minW,Math.round((minW+maxW)/2),maxW];
  const fmtDate=d=>{const p=d.split("-");return`${p[2]}/${p[1]}`;};
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
      {/* Grid */}
      {yTicks.map(t=>(
        <g key={t}>
          <line x1={padL} y1={yScale(t)} x2={W-padR} y2={yScale(t)} stroke={C.border} strokeWidth={1} strokeDasharray="3,3"/>
          <text x={padL-6} y={yScale(t)+4} textAnchor="end" style={{fontSize:9,fill:C.dim,fontFamily:"'DM Sans',sans-serif"}}>{t}</text>
        </g>
      ))}
      {/* Goal line */}
      <line x1={padL} y1={goalY} x2={W-padR} y2={goalY} stroke={color} strokeWidth={1.5} strokeDasharray="6,4" opacity={0.6}/>
      <text x={W-padR+4} y={goalY+4} style={{fontSize:9,fill:color,fontFamily:"'DM Sans',sans-serif"}}>Obj</text>
      {/* Area under curve */}
      {pts.length>1&&(
        <path d={`${pathD} L${pts[pts.length-1].x},${H-padB} L${pts[0].x},${H-padB} Z`}
          fill={`url(#grad-${color.replace("#","")})`} opacity={0.18}/>
      )}
      <defs>
        <linearGradient id={`grad-${color.replace("#","")}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color}/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {/* Line */}
      {pts.length>1&&<path d={pathD} fill="none" stroke={color} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>}
      {/* Dots + labels */}
      {pts.map((p,i)=>(
        <g key={i}>
          <circle cx={p.x} cy={p.y} r={5} fill={C.bg} stroke={color} strokeWidth={2.5}/>
          <circle cx={p.x} cy={p.y} r={2.5} fill={color}/>
          <text x={p.x} y={p.y-10} textAnchor="middle" style={{fontSize:9,fill:C.muted,fontFamily:"'DM Sans',sans-serif"}}>{p.w}kg</text>
          {(i===0||i===pts.length-1||pts.length<=5)&&(
            <text x={p.x} y={H-padB+14} textAnchor="middle" style={{fontSize:8,fill:C.dim,fontFamily:"'DM Sans',sans-serif"}}>{fmtDate(p.date)}</text>
          )}
        </g>
      ))}
    </svg>
  );
}

// ─── PROGRESSION SCREEN ─────────────────────────────────────────────────────
function Progression({profileId}){
  const def=PROFILE_DEFS[profileId];
  const storKey=`abdfit_progress_${profileId}`;
  const cfgKey=`abdfit_profilecfg_${profileId}`;
  const [entries,setEntries]=useState(()=>LS.get(storKey,[]));
  const [cfg,setCfg]=useState(()=>LS.get(cfgKey,{goal:def.defaultGoal,startWeight:def.defaultStart}));
  const [newW,setNewW]=useState("");
  const [newD,setNewD]=useState(()=>new Date().toISOString().split("T")[0]);
  const [editGoal,setEditGoal]=useState(false);
  const [goalInput,setGoalInput]=useState(String(cfg.goal));

  const saveEntries=e=>{setEntries(e);LS.set(storKey,e);};
  const addEntry=()=>{
    const w=parseFloat(newW);
    if(isNaN(w)||w<20||w>300)return;
    const next=[...entries.filter(e=>e.date!==newD),{date:newD,weight:w}];
    saveEntries(next); setNewW("");
  };
  const removeEntry=date=>saveEntries(entries.filter(e=>e.date!==date));
  const saveGoal=()=>{
    const g=parseFloat(goalInput);
    if(isNaN(g))return;
    const nc={...cfg,goal:g};setCfg(nc);LS.set(cfgKey,nc);setEditGoal(false);
  };

  const sorted=[...entries].sort((a,b)=>b.date.localeCompare(a.date));
  const latest=sorted[0];
  const first=entries.length>0?[...entries].sort((a,b)=>a.date.localeCompare(b.date))[0]:null;
  const diff=latest&&first?+(latest.weight-first.weight).toFixed(1):null;
  const toGoal=latest?(+(latest.weight-cfg.goal).toFixed(1)):null;

  return(
    <div style={{padding:"0 18px 40px",maxWidth:480,margin:"0 auto"}}>
      {/* Stats bar */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:20}} className="fade-up">
        {[
          {label:"ACTUEL",value:latest?`${latest.weight}kg`:"—",color:def.color},
          {label:"VARIATION",value:diff!==null?(diff>0?`+${diff}kg`:`${diff}kg`):"—",color:diff!==null&&diff<0?"#7DFF9A":diff>0?C.terra:C.muted},
          {label:"OBJECTIF",value:`${cfg.goal}kg`,color:C.gold},
        ].map(s=>(
          <div key={s.label} style={{background:`linear-gradient(135deg,${C.card},${C.surface})`,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
            <div style={{fontSize:9,letterSpacing:2,color:C.dim,marginBottom:4}}>{s.label}</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:s.color,letterSpacing:1}}>{s.value}</div>
          </div>
        ))}
      </div>

      {/* Objectif edit */}
      <div style={{marginBottom:16,display:"flex",alignItems:"center",gap:8}} className="fade-up">
        {editGoal?(
          <>
            <input type="number" value={goalInput} onChange={e=>setGoalInput(e.target.value)}
              style={{flex:1,background:C.surface,border:`1px solid ${C.orange}`,borderRadius:8,padding:"8px 12px",color:C.cream,fontSize:14}}/>
            <button onClick={saveGoal} style={{padding:"8px 16px",borderRadius:8,background:C.orange,border:"none",color:"#0E0800",fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:1,cursor:"pointer"}}>OK</button>
            <button onClick={()=>setEditGoal(false)} style={{padding:"8px 12px",borderRadius:8,background:"transparent",border:`1px solid ${C.border}`,color:C.muted,cursor:"pointer",fontSize:12}}>✕</button>
          </>
        ):(
          <button onClick={()=>setEditGoal(true)} style={{background:`${C.gold}18`,border:`1px solid ${C.gold}44`,color:C.gold,borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:12,letterSpacing:1}}>
            ✎ Modifier l'objectif · {cfg.goal}kg
          </button>
        )}
        {toGoal!==null&&<div style={{fontSize:11,color:C.muted,marginLeft:"auto"}}>{toGoal>0?`encore ${toGoal}kg`:"🎯 Objectif atteint !"}</div>}
      </div>

      {/* Chart */}
      <div style={{background:`linear-gradient(135deg,${C.card},${C.surface})`,border:`1px solid ${C.border}`,borderRadius:14,padding:"16px",marginBottom:16}} className="fade-up">
        <div style={{fontSize:10,letterSpacing:2,color:C.muted,marginBottom:12}}>COURBE DE POIDS</div>
        <WeightChart entries={entries} goal={cfg.goal} color={def.color}/>
      </div>

      {/* Add entry */}
      <div style={{background:`linear-gradient(135deg,${C.card},${C.surface})`,border:`1px solid ${C.border}`,borderRadius:14,padding:"16px",marginBottom:16}} className="fade-up">
        <div style={{fontSize:10,letterSpacing:2,color:C.muted,marginBottom:12}}>AJOUTER UN POIDS</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input type="date" value={newD} onChange={e=>setNewD(e.target.value)}
            style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 10px",color:C.cream,fontSize:13}}/>
          <input type="number" placeholder="kg" value={newW} onChange={e=>setNewW(e.target.value)}
            style={{width:80,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 10px",color:C.cream,fontSize:14,textAlign:"center"}}/>
          <button onClick={addEntry} style={{padding:"10px 18px",borderRadius:8,background:`linear-gradient(135deg,${def.color},${def.color}CC)`,border:"none",color:"#0E0800",fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:1,cursor:"pointer"}}>+</button>
        </div>
      </div>

      {/* History */}
      {sorted.length>0&&(
        <div style={{background:`linear-gradient(135deg,${C.card},${C.surface})`,border:`1px solid ${C.border}`,borderRadius:14,padding:"16px"}} className="fade-up">
          <div style={{fontSize:10,letterSpacing:2,color:C.muted,marginBottom:12}}>HISTORIQUE</div>
          {sorted.slice(0,10).map((e,i)=>(
            <div key={e.date} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:i<sorted.length-1?`1px solid ${C.border}`:"none"}}>
              <div style={{fontSize:12,color:C.muted}}>{new Date(e.date+"T12:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"})}</div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:def.color,letterSpacing:1}}>{e.weight} kg</div>
              <button onClick={()=>removeEntry(e.date)} style={{background:"transparent",border:"none",color:C.dim,cursor:"pointer",fontSize:16,padding:"0 4px"}}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── WORKOUT SCREEN ──────────────────────────────────────────────────────────
function Workout({session,level,duration,color,onBack}){
  const [elapsed,setElapsed]=useState(0);
  const [running,setRunning]=useState(false);
  const [musicMode,setMusicMode]=useState(()=>LS.get('abdfit_musicMode',false));
  const startRef=useRef(null);
  const savedRef=useRef(0);
  const intervalRef=useRef();
  const wakeLockRef=useRef(null);
  const sess=SESSIONS[session];

  const toggleMusicMode=()=>{
    const next=!musicMode;
    setMusicMode(next);
    LS.set('abdfit_musicMode',next);
    if(next) AudioEngine.stopKeepAlive(); // stop audio if switching to music mode
  };

  // Request Wake Lock — keeps screen on so JS keeps running
  const requestWakeLock = async()=>{
    try{
      if('wakeLock' in navigator){
        wakeLockRef.current = await navigator.wakeLock.request('screen');
      }
    }catch(e){}
  };
  const releaseWakeLock = ()=>{
    try{ if(wakeLockRef.current){ wakeLockRef.current.release(); wakeLockRef.current=null; } }catch(e){}
  };
  // Re-acquire after screen unlocks (iOS releases it on lock)
  useEffect(()=>{
    const onVis=()=>{ if(!document.hidden && running) requestWakeLock(); };
    document.addEventListener('visibilitychange', onVis);
    return()=>{ document.removeEventListener('visibilitychange', onVis); releaseWakeLock(); };
  },[running]);

  const toggleRunning=()=>{
    setRunning(p=>{
      const next=!p;
      if(next){
        startRef.current=Date.now()-savedRef.current*1000;
        requestWakeLock();
        AudioEngine.getCtx(); // unlock audio context on user gesture
      } else {
        savedRef.current=elapsed;
        clearInterval(intervalRef.current);
        releaseWakeLock();
      }
      return next;
    });
  };

  useEffect(()=>{
    if(!running) return;
    intervalRef.current=setInterval(()=>{
      setElapsed(Math.floor((Date.now()-startRef.current)/1000));
    },500);
    // Recalculate on screen unlock
    const onVis=()=>{ if(!document.hidden&&startRef.current) setElapsed(Math.floor((Date.now()-startRef.current)/1000)); };
    document.addEventListener('visibilitychange',onVis);
    return()=>{ clearInterval(intervalRef.current); document.removeEventListener('visibilitychange',onVis); };
  },[running]);
  const phases=useMemo(()=>buildProgram(session,level,duration),[session,level,duration]);
  const fmt=s=>`${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor((s%3600)/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const lvLabel=LEVELS.find(l=>l.key===level).label;
  return(
    <div style={{minHeight:"100vh",background:`radial-gradient(ellipse at top,#3A1800 0%,${C.bg} 50%)`,paddingBottom:100}}>
      <div style={{position:"sticky",top:0,zIndex:100,background:`#1A0E03F0`,padding:"14px 18px 12px",borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",alignItems:"center",gap:10,maxWidth:480,margin:"0 auto"}}>
          <button onClick={onBack} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13}}>←</button>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:2,color:sess.color}}>{sess.label}</span>
              <span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:`${sess.color}22`,color:sess.color}}>{lvLabel.toUpperCase()}</span>
              <span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:`${C.amber}22`,color:C.amber}}>{duration}MIN</span>
            </div>
            <div style={{fontSize:11,color:C.dim}}>{sess.subtitle}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:19,letterSpacing:2,color:running?sess.color:C.dim}}>{fmt(elapsed)}</div>
            <div style={{display:"flex",gap:6,justifyContent:"flex-end",marginTop:2}}>
              <button onClick={toggleMusicMode} style={{fontSize:10,padding:"2px 8px",borderRadius:6,border:`1px solid ${musicMode?"#1DB954":"#333"}`,background:musicMode?"#1DB95422":"transparent",color:musicMode?"#1DB954":C.dim,cursor:"pointer"}} title="Mode musique">🎵</button>
              <button onClick={toggleRunning} style={{fontSize:10,padding:"2px 10px",borderRadius:6,border:`1px solid ${running?sess.color+"55":C.border}`,background:running?`${sess.color}18`:"transparent",color:running?sess.color:C.dim,cursor:"pointer"}}>{running?"⏸":"▶ Start"}</button>
            </div>
          </div>
        </div>
      </div>
      <div style={{padding:"16px 18px",maxWidth:480,margin:"0 auto"}}>
        {phases.map((phase,pi)=>(
          <div key={pi} style={{marginBottom:24,animationDelay:`${pi*0.08}s`}} className="fade-up">
            <div style={{display:"flex",alignItems:"center",marginBottom:12,gap:10}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:`${sess.color}33`,border:`1px solid ${sess.color}55`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Bebas Neue',sans-serif",fontSize:12,color:sess.color,flexShrink:0}}>{pi+1}</div>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:2,color:C.cream}}>{phase.name.toUpperCase()}</div>
                <div style={{fontSize:11,color:C.dim}}>{phase.duration}</div>
              </div>
            </div>
            {phase.exercises.map((ex,ei)=>(<ExerciseCard key={`${pi}-${ei}`} ex={ex} color={sess.color} musicMode={musicMode}/>))}
          </div>
        ))}
        <div style={{padding:"14px 16px",background:`linear-gradient(135deg,#2A1A08,#1C1005)`,borderRadius:12,border:`1px solid ${C.border}`,borderLeft:`3px solid ${C.gold}`}}>
          <div style={{fontSize:10,letterSpacing:2,color:C.amber,marginBottom:6}}>💡 NUTRITION</div>
          <div style={{fontSize:12,color:C.muted,lineHeight:1.7}}>
            {level==="debutant"?"Mange 1.6–1.8g de protéines par kg. Progression avant restriction calorique.":level==="intermediaire"?"Vise -350 kcal/jour. 1.8–2g de protéines par kg.":"Recomposition : maintien ±100 kcal + 2–2.2g protéines/kg. Cycle carbs autour des séances."}
          </div>
        </div>
      </div>
    </div>
  );
}

            return(<button key={d} onClick={()=>setDuration(d)} style={{flex:1,padding:"14px 4px",borderRadius:12,cursor:"pointer",border:`2px solid ${active?C.amber:C.border}`,background:active?`${C.amber}22`:`linear-gradient(135deg,${C.card},${C.surface})`,transition:"all 0.2s",transform:active?"scale(1.04)":"scale(1)"}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:active?C.amber:C.muted}}>{d}</div>
              <div style={{fontSize:10,color:active?C.amber:C.dim}}>min</div>
            </button>);
          })}
        </div>
      </div>
      {/* CTA */}
      <button onClick={()=>{savePref();onStart(session,level,duration);}} style={{width:"100%",padding:"18px",borderRadius:16,cursor:"pointer",border:`2px solid ${sess.color}`,background:`linear-gradient(135deg,${sess.color},${sess.color}CC)`,boxShadow:`0 8px 28px ${sess.color}44`,fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:3,color:"#0D0806",transition:"all 0.2s"}}>
        LANCER {sess.emoji}
      </button>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const [activeProfile,setActiveProfile]=useState(()=>LS.get("abdfit_activeProfile","miovida"));
  const [tab,setTab]=useState("seance");
  const [workout,setWorkout]=useState(null);
  const [logoTaps,setLogoTaps]=useState(0);
  const [showSecret,setShowSecret]=useState(false);
  const [bgConfig,setBgConfig]=useState(()=>LS.get("abdfit_bgconfig",BG_PRESETS[0]));
  const [showInstallBanner,setShowInstallBanner]=useState(false);
  const [notifStatus,setNotifStatus]=useState(()=>'Notification' in window ? Notification.permission : 'unsupported');
  const tapTimer=useRef();

  const profile=PROFILE_DEFS[activeProfile];

  // Register service worker + request notifications on load
  useEffect(()=>{
    // Register SW
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('/sw.js').catch(()=>{});
    }
    // Show iOS install banner if not already standalone
    const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone=window.matchMedia('(display-mode: standalone)').matches||navigator.standalone;
    if(isIOS && !isStandalone && !LS.get('abdfit_installDismissed',false)){
      setTimeout(()=>setShowInstallBanner(true), 2000);
    }
  },[]);

  const requestNotifications=async()=>{
    if(!('Notification' in window)) return;
    const result=await Notification.requestPermission();
    setNotifStatus(result);
  };

  const handleLogoTap=()=>{
    const next=logoTaps+1;
    setLogoTaps(next);
    clearTimeout(tapTimer.current);
    if(next>=5){setShowSecret(true);setLogoTaps(0);}
    else{tapTimer.current=setTimeout(()=>setLogoTaps(0),1500);}
  };

  const switchProfile=id=>{
    setActiveProfile(id);LS.set("abdfit_activeProfile",id);
    setTab("seance");setWorkout(null);
  };

  const topColor=bgConfig.top||"#3A1800";

  if(workout){
    return <Workout {...workout} color={profile.color} onBack={()=>setWorkout(null)}/>;
  }

  return(
    <div style={{minHeight:"100vh",background:`radial-gradient(ellipse at top,${topColor} 0%,${bgConfig.bg} 55%)`}}>
      {/* Header */}
      <div style={{padding:"20px 18px 14px",borderBottom:`1px solid ${C.border}`,background:`${bgConfig.bg}CC`,position:"sticky",top:0,zIndex:100,backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",maxWidth:480,margin:"0 auto"}}>
          <div onClick={handleLogoTap} style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:900,lineHeight:1,cursor:"default",userSelect:"none",position:"relative"}}>
            <span style={{color:C.cream}}>Abdella</span><span style={{color:C.orange}}>Fit</span>
            {logoTaps>0&&logoTaps<5&&(
              <div style={{position:"absolute",top:-6,right:-10,width:16,height:16,borderRadius:"50%",background:C.orange,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#0E0800",fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>{5-logoTaps}</div>
            )}
          </div>
          <button onClick={()=>setTab("profil")} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",borderRadius:20,background:`${profile.color}20`,border:`1px solid ${profile.color}55`,cursor:"pointer"}}>
            <span style={{fontSize:16}}>{profile.emoji}</span>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:700,color:profile.color}}>{profile.name}</span>
          </button>
        </div>
      </div>

      {/* Notification permission banner */}
      {notifStatus==='default'&&(
        <div style={{background:`${C.orange}18`,borderBottom:`1px solid ${C.orange}33`,padding:"10px 18px",display:"flex",alignItems:"center",gap:10,maxWidth:480,margin:"0 auto"}}>
          <span style={{fontSize:16}}>🔔</span>
          <div style={{flex:1,fontSize:12,color:C.muted}}>Active les notifications pour être alerté quand le repos est terminé</div>
          <button onClick={requestNotifications} style={{background:C.orange,border:"none",color:"#0E0800",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:1,flexShrink:0}}>ACTIVER</button>
        </div>
      )}

      {/* Content */}
      <div style={{paddingTop:8}}>
        {tab==="seance"&&(<SessionConfig profileId={activeProfile} profileColor={profile.color} onStart={(s,l,d)=>setWorkout({session:s,level:l,duration:d})}/>)}
        {tab==="progression"&&(
          <div style={{padding:"16px 0 0"}}>
            <div style={{padding:"0 18px 14px",display:"flex",alignItems:"center",gap:10,maxWidth:480,margin:"0 auto"}}>
              <span style={{fontSize:22}}>{profile.emoji}</span>
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:profile.color}}>{profile.name}</div>
                <div style={{fontSize:11,color:C.dim}}>Suivi du poids</div>
              </div>
            </div>
            <Progression profileId={activeProfile}/>
          </div>
        )}
        {tab==="profil"&&(<ProfilScreen activeProfile={activeProfile} onSwitch={switchProfile}/>)}
      </div>

      <BottomNav tab={tab} setTab={setTab} profileColor={profile.color}/>

      {/* iOS install banner */}
      {showInstallBanner&&(
        <div style={{position:"fixed",bottom:72,left:16,right:16,zIndex:300,background:`linear-gradient(135deg,#2A1400,#1A0C00)`,border:`1px solid ${C.orange}55`,borderRadius:16,padding:"16px",boxShadow:"0 8px 32px #00000088"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:2,color:C.orange}}>📲 INSTALLER L'APP</div>
            <button onClick={()=>{setShowInstallBanner(false);LS.set('abdfit_installDismissed',true);}} style={{background:"transparent",border:"none",color:C.dim,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
          </div>
          <div style={{fontSize:12,color:C.muted,lineHeight:1.7}}>
            Pour les notifications et le chrono en fond d'écran :<br/>
            Tape <strong style={{color:C.cream}}>Partager</strong> → <strong style={{color:C.cream}}>"Sur l'écran d'accueil"</strong>
          </div>
          <div style={{fontSize:18,marginTop:10,textAlign:"center"}}>⬆️ 📱</div>
        </div>
      )}

      {showSecret&&<SecretPanel onClose={()=>setShowSecret(false)} bgConfig={bgConfig} setBgConfig={setBgConfig}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
