function buildProgram(session, level, duration){
  const bank = BANK[session];
  const cfg = {
    45: {warmup:5,  compoundN:2,compoundSets:3,isolN:1,isolSets:2,hasFinisher:false,finMin:0},
    60: {warmup:8,  compoundN:2,compoundSets:3,isolN:2,isolSets:2,hasFinisher:true, finMin:8},
    90: {warmup:10, compoundN:3,compoundSets:4,isolN:2,isolSets:3,hasFinisher:true, finMin:12},
    120:{warmup:10, compoundN:3,compoundSets:4,isolN:3,isolSets:3,hasFinisher:true, finMin:18},
  }[duration];
  const reps = {
    debutant:      {compound:"12–15",isolation:"15–20",rest:{compound:75, isolation:45}},
    intermediaire: {compound:"8–12", isolation:"12–15",rest:{compound:90, isolation:60}},
    expert:        {compound:"5–8",  isolation:"10–12",rest:{compound:120,isolation:75}},
  }[level];
  const phases = [];
  phases.push({name:"Échauffement",duration:`${cfg.warmup} min`,exercises:[{
    name:"Cardio léger + mobilité",sets:1,reps:`${cfg.warmup} min`,rest:0,isSimple:true,
    tip:level==="debutant"?"Marche rapide ou vélo léger, FC 110–120 bpm":level==="intermediaire"?"Rameur ou vélo, FC 120–130 bpm + mobilité":"Rameur intensité progressive + activation dynamique"
  }]});
  const compounds = bank.compound[level].slice(0,cfg.compoundN).map(ex=>({...ex,sets:cfg.compoundSets,reps:reps.compound,rest:reps.rest.compound}));
  const totalC = Math.round(cfg.compoundN*cfg.compoundSets*(reps.rest.compound/60+1));
  phases.push({name:"Exercices Compound",duration:`~${totalC} min`,exercises:compounds});
  const isos = bank.isolation[level].slice(0,cfg.isolN).map(ex=>({...ex,sets:cfg.isolSets,reps:reps.isolation,rest:reps.rest.isolation}));
  const totalI = Math.round(cfg.isolN*cfg.isolSets*(reps.rest.isolation/60+0.75));
  phases.push({name:"Isolation & Finition",duration:`~${totalI} min`,exercises:isos});
  if(cfg.hasFinisher){
    const fin=bank.finisher[level];
    phases.push({name:"Finisher",duration:`${cfg.finMin} min`,exercises:[{name:fin.name,tip:fin.tip,sets:1,reps:`${cfg.finMin} min`,rest:0,isSimple:true}]});
  }
  return phases;
}

// ─── REST TIMER ──────────────────────────────────────────────────────────────
function RestTimer({seconds, onDone, exerciseName, accent}){
  const endRef = useRef(Date.now() + seconds*1000);
  const [left, setLeft] = useState(seconds);
  const tickRef = useRef();

  const tick = useCallback(()=>{
    const rem = Math.max(0, Math.ceil((endRef.current - Date.now())/1000));
    setLeft(rem);
    if(rem <= 0){ onDone(); return; }
    tickRef.current = setTimeout(tick, 250);
  },[onDone]);

  useEffect(()=>{
    tickRef.current = setTimeout(tick, 100);
    const onVis=()=>{ if(!document.hidden){ clearTimeout(tickRef.current); tick(); }};
    document.addEventListener('visibilitychange', onVis);
    return()=>{ clearTimeout(tickRef.current); document.removeEventListener('visibilitychange', onVis); };
  },[tick]);

  const pct=(seconds-left)/seconds, r=22, circ=2*Math.PI*r;
  const col = left<=3 && left>0 ? "#FF2020" : accent;
  return(
    <div style={{display:"flex",alignItems:"center",gap:14,background:`${accent}15`,border:`1px solid ${col}44`,borderRadius:12,padding:"10px 16px",marginTop:10}}>
      <svg width={54} height={54} viewBox="0 0 54 54">
        <circle cx={27} cy={27} r={r} fill="none" stroke="#2A2A2A" strokeWidth={4}/>
        <circle cx={27} cy={27} r={r} fill="none" stroke={col} strokeWidth={4}
          strokeDasharray={String(circ)} strokeDashoffset={String(circ*(1-pct))}
          transform="rotate(-90 27 27)" style={{transition:"stroke-dashoffset 0.25s linear"}}/>
        <text x={27} y={32} textAnchor="middle" style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,fill:col}}>{left}</text>
      </svg>
      <div>
        <div style={{fontSize:11,color:"#888",letterSpacing:1}}>RÉCUPÉRATION</div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:col,letterSpacing:2}}>{left}s</div>
      </div>
      <button onClick={onDone} style={{marginLeft:"auto",background:"transparent",border:"1px solid #333",color:"#666",borderRadius:8,padding:"4px 12px",cursor:"pointer",fontSize:12}}>Skip</button>
    </div>
  );
}

// ─── WEIGHT CHART ────────────────────────────────────────────────────────────
function WeightChart({entries, goal, color}){
  if(!entries||entries.length===0) return(
    <div style={{textAlign:"center",padding:"32px 0",color:"#555",fontSize:13}}>
      Aucune donnée encore.<br/>Ajoute ton premier poids ci-dessus.
    </div>
  );
  const W=340,H=160,padL=40,padR=20,padT=16,padB=28;
  const sorted=[...entries].sort((a,b)=>a.date.localeCompare(b.date));
  const weights=sorted.map(e=>e.weight);
  const allW=[...weights,goal];
  const minW=Math.floor(Math.min(...allW)-1), maxW=Math.ceil(Math.max(...allW)+1);
  const xScale=i=>sorted.length===1?padL+(W-padL-padR)/2:padL+(W-padL-padR)*(i/(sorted.length-1));
  const yScale=w=>padT+(H-padT-padB)*(1-(w-minW)/(maxW-minW));
  const goalY=yScale(goal);
  const pts=sorted.map((e,i)=>({x:xScale(i),y:yScale(e.weight),w:e.weight,date:e.date}));
  const pathD=pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const yTicks=[minW,Math.round((minW+maxW)/2),maxW];
  const fmtDate=d=>{const p=d.split("-");return`${p[2]}/${p[1]}`;};
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
      <defs>
        <linearGradient id={`g${color.replace("#","")}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color}/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {yTicks.map(t=>(
        <g key={t}>
          <line x1={padL} y1={yScale(t)} x2={W-padR} y2={yScale(t)} stroke="#2A2A2A" strokeWidth={1} strokeDasharray="3,3"/>
          <text x={padL-6} y={yScale(t)+4} textAnchor="end" style={{fontSize:9,fill:"#555"}}>{t}</text>
        </g>
      ))}
      <line x1={padL} y1={goalY} x2={W-padR} y2={goalY} stroke={color} strokeWidth={1.5} strokeDasharray="6,4" opacity={0.6}/>
      <text x={W-padR+4} y={goalY+4} style={{fontSize:9,fill:color}}>Obj</text>
      {pts.length>1&&(
        <path d={`${pathD} L${pts[pts.length-1].x},${H-padB} L${pts[0].x},${H-padB} Z`}
          fill={`url(#g${color.replace("#","")})`} opacity={0.15}/>
      )}
      {pts.length>1&&<path d={pathD} fill="none" stroke={color} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>}
      {pts.map((p,i)=>(
        <g key={i}>
          <circle cx={p.x} cy={p.y} r={5} fill="#0A0A0A" stroke={color} strokeWidth={2.5}/>
          <circle cx={p.x} cy={p.y} r={2.5} fill={color}/>
          <text x={p.x} y={p.y-10} textAnchor="middle" style={{fontSize:9,fill:"#888"}}>{p.w}kg</text>
          {(i===0||i===pts.length-1||pts.length<=5)&&(
            <text x={p.x} y={H-padB+14} textAnchor="middle" style={{fontSize:8,fill:"#555"}}>{fmtDate(p.date)}</text>
          )}
        </g>
      ))}
    </svg>
  );
}

// ─── PROGRESSION ─────────────────────────────────────────────────────────────
function Progression({profileId, palette}){
  const def=PROFILE_DEFS[profileId];
  const storKey=`abdfit_progress_${profileId}`;
  const cfgKey=`abdfit_profilecfg_${profileId}`;
  const [entries,setEntries]=useState(()=>LS.get(storKey,[]));
  const [cfg,setCfg]=useState(()=>LS.get(cfgKey,{goal:def.defaultGoal}));
  const [newW,setNewW]=useState("");
  const [newD,setNewD]=useState(()=>new Date().toISOString().split("T")[0]);
  const [editGoal,setEditGoal]=useState(false);
  const [goalInput,setGoalInput]=useState(String(cfg.goal||def.defaultGoal));
  const accent=palette.accent;
  const saveEntries=e=>{setEntries(e);LS.set(storKey,e);};
  const addEntry=()=>{
    const w=parseFloat(newW);
    if(isNaN(w)||w<20||w>300) return;
    const next=[...entries.filter(e=>e.date!==newD),{date:newD,weight:w}];
    saveEntries(next); setNewW("");
  };
  const removeEntry=date=>saveEntries(entries.filter(e=>e.date!==date));
  const saveGoal=()=>{
    const g=parseFloat(goalInput);
    if(isNaN(g)) return;
    const nc={...cfg,goal:g};setCfg(nc);LS.set(cfgKey,nc);setEditGoal(false);
  };
  const sorted=[...entries].sort((a,b)=>b.date.localeCompare(a.date));
  const latest=sorted[0];
  const first=entries.length>0?[...entries].sort((a,b)=>a.date.localeCompare(b.date))[0]:null;
  const diff=latest&&first?+(latest.weight-first.weight).toFixed(1):null;
  const toGoal=latest?(+(latest.weight-(cfg.goal||def.defaultGoal)).toFixed(1)):null;
  const A=accent;
  return(
    <div style={{padding:"0 18px 40px",maxWidth:480,margin:"0 auto"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:20}} className="fade-up">
        {[
          {label:"ACTUEL",  value:latest?`${latest.weight}kg`:"—", color:A},
          {label:"VARIATION",value:diff!==null?(diff>0?`+${diff}kg`:`${diff}kg`):"—",color:diff!==null&&diff<0?"#7DFF9A":diff>0?"#FF4040":"#888"},
          {label:"OBJECTIF",value:`${cfg.goal||def.defaultGoal}kg`,color:"#FFB84A"},
        ].map(s=>(
          <div key={s.label} style={{background:palette.surface,border:`1px solid ${palette.border}`,borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
            <div style={{fontSize:9,letterSpacing:2,color:"#555",marginBottom:4}}>{s.label}</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:s.color,letterSpacing:1}}>{s.value}</div>
          </div>
        ))}
      </div>
      <div style={{marginBottom:16,display:"flex",alignItems:"center",gap:8}} className="fade-up">
        {editGoal?(
          <>
            <input type="number" value={goalInput} onChange={e=>setGoalInput(e.target.value)}
              style={{flex:1,background:palette.surface,border:`1px solid ${A}`,borderRadius:8,padding:"8px 12px",color:"#FFF",fontSize:14}}/>
            <button onClick={saveGoal} style={{padding:"8px 16px",borderRadius:8,background:A,border:"none",color:"#000",fontFamily:"'Bebas Neue',sans-serif",fontSize:14,cursor:"pointer"}}>OK</button>
            <button onClick={()=>setEditGoal(false)} style={{padding:"8px 12px",borderRadius:8,background:"transparent",border:`1px solid ${palette.border}`,color:"#666",cursor:"pointer",fontSize:12}}>✕</button>
          </>
        ):(
          <button onClick={()=>setEditGoal(true)} style={{background:`${A}18`,border:`1px solid ${A}44`,color:A,borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:12}}>
            ✎ Modifier l'objectif · {cfg.goal||def.defaultGoal}kg
          </button>
        )}
        {toGoal!==null&&<div style={{fontSize:11,color:"#555",marginLeft:"auto"}}>{toGoal>0?`encore ${toGoal}kg`:"🎯 Objectif atteint !"}</div>}
      </div>
      <div style={{background:palette.surface,border:`1px solid ${palette.border}`,borderRadius:14,padding:"16px",marginBottom:16}} className="fade-up">
        <div style={{fontSize:10,letterSpacing:2,color:"#555",marginBottom:12}}>COURBE DE POIDS</div>
        <WeightChart entries={entries} goal={cfg.goal||def.defaultGoal} color={def.color}/>
      </div>
      <div style={{background:palette.surface,border:`1px solid ${palette.border}`,borderRadius:14,padding:"16px",marginBottom:16}} className="fade-up">
        <div style={{fontSize:10,letterSpacing:2,color:"#555",marginBottom:12}}>AJOUTER UN POIDS</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input type="date" value={newD} onChange={e=>setNewD(e.target.value)}
            style={{flex:1,background:"#111",border:`1px solid ${palette.border}`,borderRadius:8,padding:"10px",color:"#FFF",fontSize:13}}/>
          <input type="number" placeholder="kg" value={newW} onChange={e=>setNewW(e.target.value)}
            style={{width:80,background:"#111",border:`1px solid ${palette.border}`,borderRadius:8,padding:"10px",color:"#FFF",fontSize:14,textAlign:"center"}}/>
          <button onClick={addEntry} style={{padding:"10px 18px",borderRadius:8,background:A,border:"none",color:"#000",fontFamily:"'Bebas Neue',sans-serif",fontSize:16,cursor:"pointer"}}>+</button>
        </div>
      </div>
      {sorted.length>0&&(
        <div style={{background:palette.surface,border:`1px solid ${palette.border}`,borderRadius:14,padding:"16px"}} className="fade-up">
          <div style={{fontSize:10,letterSpacing:2,color:"#555",marginBottom:12}}>HISTORIQUE</div>
          {sorted.slice(0,10).map((e,i)=>(
            <div key={e.date} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:i<sorted.length-1?`1px solid ${palette.border}`:"none"}}>
              <div style={{fontSize:12,color:"#555"}}>{new Date(e.date+"T12:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"})}</div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:A,letterSpacing:1}}>{e.weight} kg</div>
              <button onClick={()=>removeEntry(e.date)} style={{background:"transparent",border:"none",color:"#444",cursor:"pointer",fontSize:16,padding:"0 4px"}}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── WORKOUT SCREEN ───────────────────────────────────────────────────────────
function Workout({session, level, duration, onBack, palette}){
  const [elapsed,setElapsed]=useState(0);
  const [running,setRunning]=useState(false);
  const startRef=useRef(null);
  const savedRef=useRef(0);
  const intervalRef=useRef();
  const wakeLockRef=useRef(null);
  const sess=SESSIONS[session];
  const A=palette.accent;

  const requestWakeLock=async()=>{
    try{ if('wakeLock' in navigator) wakeLockRef.current=await navigator.wakeLock.request('screen'); }catch(e){}
  };
  const releaseWakeLock=()=>{
    try{ if(wakeLockRef.current){wakeLockRef.current.release();wakeLockRef.current=null;} }catch(e){}
  };
  useEffect(()=>{
    const onVis=()=>{ if(!document.hidden&&running) requestWakeLock(); };
    document.addEventListener('visibilitychange',onVis);
    return()=>{ document.removeEventListener('visibilitychange',onVis); releaseWakeLock(); };
  },[running]);

  const toggleRunning=()=>{
    setRunning(p=>{
      const next=!p;
      if(next){ startRef.current=Date.now()-savedRef.current*1000; requestWakeLock(); }
      else { savedRef.current=elapsed; clearInterval(intervalRef.current); releaseWakeLock(); }
      return next;
    });
  };
  useEffect(()=>{
    if(!running) return;
    intervalRef.current=setInterval(()=>setElapsed(Math.floor((Date.now()-startRef.current)/1000)),500);
    const onVis=()=>{ if(!document.hidden&&startRef.current) setElapsed(Math.floor((Date.now()-startRef.current)/1000)); };
    document.addEventListener('visibilitychange',onVis);
    return()=>{ clearInterval(intervalRef.current); document.removeEventListener('visibilitychange',onVis); };
  },[running]);

  const phases=useMemo(()=>buildProgram(session,level,duration),[session,level,duration]);
  const fmt=s=>`${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor((s%3600)/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const lvLabel=LEVELS.find(l=>l.key===level).label;

  return(
    <div style={{minHeight:"100vh",background:`radial-gradient(ellipse at top,${palette.top||"#2A1400"} 0%,${palette.bg} 55%)`,paddingBottom:100}}>
      <div style={{position:"sticky",top:0,zIndex:100,background:`${palette.bg}F0`,padding:"14px 18px 12px",borderBottom:`1px solid ${palette.border}`,backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,maxWidth:480,margin:"0 auto"}}>
          <button onClick={onBack} style={{background:"transparent",border:`1px solid ${palette.border}`,color:"#666",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13}}>←</button>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:2,color:A}}>{sess.label}</span>
              <span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:`${A}22`,color:A}}>{lvLabel.toUpperCase()}</span>
              <span style={{fontSize:10,padding:"2px 7px",borderRadius:20,background:"#2A2A2A",color:"#888"}}>{duration}MIN</span>
            </div>
            <div style={{fontSize:11,color:"#555"}}>{sess.subtitle}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:19,letterSpacing:2,color:running?A:"#444"}}>{fmt(elapsed)}</div>
            <button onClick={toggleRunning} style={{fontSize:10,padding:"2px 10px",borderRadius:6,border:`1px solid ${running?A+"55":"#333"}`,background:running?`${A}18`:"transparent",color:running?A:"#555",cursor:"pointer"}}>{running?"⏸":"▶ Start"}</button>
          </div>
        </div>
      </div>
      <div style={{padding:"16px 18px",maxWidth:480,margin:"0 auto"}}>
        {phases.map((phase,pi)=>(
          <div key={pi} style={{marginBottom:24}} className="fade-up">
            <div style={{display:"flex",alignItems:"center",marginBottom:12,gap:10}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:`${A}33`,border:`1px solid ${A}55`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Bebas Neue',sans-serif",fontSize:12,color:A,flexShrink:0}}>{pi+1}</div>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:2,color:"#FFF"}}>{phase.name.toUpperCase()}</div>
                <div style={{fontSize:11,color:"#555"}}>{phase.duration}</div>
              </div>
            </div>
            {phase.exercises.map((ex,ei)=>(
              <ExerciseCard key={`${pi}-${ei}`} ex={ex} accent={A} surface={palette.surface} border={palette.border}/>
            ))}
          </div>
        ))}
        <div style={{padding:"14px 16px",background:palette.surface,borderRadius:12,border:`1px solid ${palette.border}`,borderLeft:`3px solid ${A}`}}>
          <div style={{fontSize:10,letterSpacing:2,color:A,marginBottom:6}}>💡 NUTRITION</div>
          <div style={{fontSize:12,color:"#666",lineHeight:1.7}}>
            {level==="debutant"?"1.6–1.8g de protéines/kg. La progression passe avant la restriction calorique.":level==="intermediaire"?"Vise -350 kcal/jour. 1.8–2g de protéines/kg. Augmente les charges d'abord.":"Recomposition : maintien calorique ±100 kcal + 2–2.2g protéines/kg."}
          </div>
        </div>
      </div>
    </div>
  );
}

            const active=session===k;
            return(
              <button key={k} onClick={()=>setSession(k)} style={{padding:"14px 10px",borderRadius:14,cursor:"pointer",border:`2px solid ${active?s.color:palette.border}`,background:active?`${s.color}20`:palette.surface,textAlign:"left",transition:"all 0.25s",transform:active?"scale(1.02)":"scale(1)"}}>
                <div style={{fontSize:20,marginBottom:6}}>{s.icon}</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:19,letterSpacing:2,color:active?s.color:"#FFF"}}>{s.label}</div>
                <div style={{fontSize:11,color:"#666",marginTop:2}}>{s.subtitle}</div>
              </button>
            );
          })}
        </div>
      </div>
      <div style={{marginBottom:24}} className="fade-up">
        <div style={{fontSize:10,letterSpacing:3,color:"#555",marginBottom:10}}>NIVEAU</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {LEVELS.map(lv=>{
            const active=level===lv.key;
            return(
              <button key={lv.key} onClick={()=>setLevel(lv.key)} style={{display:"flex",alignItems:"center",gap:14,padding:"12px 14px",borderRadius:12,cursor:"pointer",border:`2px solid ${active?A:palette.border}`,background:active?`${A}18`:palette.surface,textAlign:"left",transition:"all 0.2s"}}>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:17,color:active?A:"#444",minWidth:32}}>{lv.badge}</div>
                <div>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:1,color:active?"#FFF":"#888"}}>{lv.label}</div>
                  <div style={{fontSize:11,color:"#555"}}>{lv.desc}</div>
                </div>
                {active&&<div style={{marginLeft:"auto",width:8,height:8,borderRadius:"50%",background:A,boxShadow:`0 0 8px ${A}`}}/>}
              </button>
            );
          })}
        </div>
      </div>
      <div style={{marginBottom:28}} className="fade-up">
        <div style={{fontSize:10,letterSpacing:3,color:"#555",marginBottom:10}}>DURÉE</div>
        <div style={{display:"flex",gap:10}}>
          {DURATIONS.map(d=>{
            const active=duration===d;
            return(
              <button key={d} onClick={()=>setDuration(d)} style={{flex:1,padding:"14px 4px",borderRadius:12,cursor:"pointer",border:`2px solid ${active?A:palette.border}`,background:active?`${A}22`:palette.surface,transition:"all 0.2s",transform:active?"scale(1.04)":"scale(1)"}}>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:active?A:"#555"}}>{d}</div>
                <div style={{fontSize:10,color:active?A:"#444"}}>min</div>
              </button>
            );
          })}
        </div>
      </div>
      <button onClick={()=>{savePref();onStart(session,level,duration);}} style={{width:"100%",padding:"18px",borderRadius:16,cursor:"pointer",border:`2px solid ${SESSIONS[session].color}`,background:`linear-gradient(135deg,${SESSIONS[session].color},${SESSIONS[session].color}CC)`,boxShadow:`0 8px 28px ${SESSIONS[session].color}44`,fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:3,color:"#0A0A0A",transition:"all 0.2s"}}>
        LANCER {SESSIONS[session].emoji}
      </button>
    </div>
  );
}

// ─── PROFIL SCREEN ────────────────────────────────────────────────────────────
function ProfilScreen({activeProfile, onSwitch, palette}){
  return(
    <div style={{padding:"16px 18px 100px",maxWidth:480,margin:"0 auto"}}>
      <div style={{fontSize:10,letterSpacing:3,color:"#555",marginBottom:14}} className="fade-up">CHOISIR UN PROFIL</div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {Object.values(PROFILE_DEFS).map(p=>{
          const active=activeProfile===p.id;
          return(
            <button key={p.id} onClick={()=>onSwitch(p.id)} style={{display:"flex",alignItems:"center",gap:16,padding:"20px 18px",borderRadius:16,cursor:"pointer",border:`2px solid ${active?p.color:palette.border}`,background:active?`${p.color}20`:palette.surface,textAlign:"left",transition:"all 0.3s",transform:active?"scale(1.02)":"scale(1)"}} className="pop-in">
              <div style={{width:54,height:54,borderRadius:"50%",background:`${p.color}33`,border:`2px solid ${p.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{p.emoji}</div>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:active?p.color:"#FFF",letterSpacing:1}}>{p.name}</div>
                <div style={{fontSize:12,color:"#555",marginTop:3}}>Objectif : {p.defaultGoal}kg · {LEVELS.find(l=>l.key===p.defaultLevel).label}</div>
              </div>
              {active&&<div style={{width:12,height:12,borderRadius:"50%",background:p.color,boxShadow:`0 0 12px ${p.color}`,flexShrink:0}}/>}
            </button>
          );
        })}
      </div>
      <div style={{marginTop:28,padding:"16px",background:palette.surface,border:`1px solid ${palette.accent}22`,borderRadius:12}} className="fade-up">
        <div style={{fontSize:10,letterSpacing:2,color:palette.accent,marginBottom:6}}>ℹ️ PROFILS</div>
        <div style={{fontSize:12,color:"#666",lineHeight:1.7}}>Chaque profil a son propre historique de poids, ses préférences de niveau et de durée. Les données sont sauvegardées sur cet appareil.</div>
      </div>
    </div>
  );
}

// ─── BOTTOM NAV ───────────────────────────────────────────────────────────────
function BottomNav({tab, setTab, accent, bg}){
  const items=[
    {key:"seance",     icon:"🏋", label:"Séance"},
    {key:"progression",icon:"📈", label:"Progression"},
    {key:"profil",     icon:"👤", label:"Profil"},
  ];
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:200,background:`${bg}F8`,borderTop:"1px solid #1A1A1A",display:"flex",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}}>
      {items.map(it=>{
        const active=tab===it.key;
        return(
          <button key={it.key} onClick={()=>setTab(it.key)} style={{flex:1,padding:"10px 4px 14px",background:"transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,transition:"all 0.2s"}}>
            <span style={{fontSize:20,filter:active?"none":"grayscale(0.6)",opacity:active?1:0.5}}>{it.icon}</span>
            <span style={{fontSize:10,letterSpacing:1,color:active?accent:"#444",fontFamily:"'DM Sans',sans-serif",fontWeight:active?500:400}}>{it.label.toUpperCase()}</span>
            {active&&<div style={{width:24,height:2,borderRadius:2,background:accent,marginTop:1}}/>}
          </button>
        );
      })}
    </div>
  );
}

// ─── SECRET PANEL ─────────────────────────────────────────────────────────────
function SecretPanel({onClose, palette, setPalette}){
  const [fam,setFam]=useState("Tous");
  const filtered=fam==="Tous"?BG_PRESETS:BG_PRESETS.filter(p=>p.family===fam);
  const select=p=>{setPalette(p);LS.set("abdfit_palette",p);};
  return(
    <div style={{position:"fixed",inset:0,zIndex:999,display:"flex",alignItems:"flex-end",background:"#00000088"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",background:"#111",border:"1px solid #2A2A2A",borderRadius:"20px 20px 0 0",padding:"20px 16px 36px",animation:"fadeUp 0.3s ease",maxHeight:"80vh",display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexShrink:0}}>
          <div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:3,color:palette.accent}}>🎨 APPARENCE</div>
            <div style={{fontSize:11,color:"#555"}}>5 taps sur le logo · {BG_PRESETS.length} palettes</div>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"1px solid #2A2A2A",color:"#666",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13}}>✕</button>
        </div>
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:10,marginBottom:10,flexShrink:0}}>
          {["Tous",...BG_FAMILIES].map(f=>(
            <button key={f} onClick={()=>setFam(f)} style={{flexShrink:0,padding:"5px 10px",borderRadius:20,cursor:"pointer",background:fam===f?palette.accent:"transparent",border:`1px solid ${fam===f?palette.accent:"#2A2A2A"}`,color:fam===f?"#000":"#555",fontSize:10,fontWeight:700,transition:"all 0.2s"}}>{f}</button>
          ))}
        </div>
        <div style={{overflowY:"auto",flex:1}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            {filtered.map(p=>{
              const active=palette.label===p.label;
              return(
                <button key={p.label} onClick={()=>select(p)} style={{padding:"8px 4px 6px",borderRadius:10,cursor:"pointer",border:`2px solid ${active?p.accent:"#1A1A1A"}`,background:active?`${p.accent}15`:"transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:5,transition:"all 0.2s",transform:active?"scale(1.05)":"scale(1)"}}>
                  <div style={{width:44,height:44,borderRadius:8,background:p.bg,border:`1px solid ${p.border}`,overflow:"hidden",position:"relative",boxShadow:active?`0 0 10px ${p.accent}66`:"none"}}>
                    <div style={{position:"absolute",bottom:0,left:0,right:0,height:3,background:p.accent}}/>
                    <div style={{padding:"5px 5px 0"}}>
                      <div style={{height:2,width:16,background:p.accent,marginBottom:3}}/>
                      <div style={{fontSize:9,fontWeight:900,color:p.text,fontFamily:"Arial Black",lineHeight:1}}>PUSH</div>
                    </div>
                  </div>
                  <span style={{fontSize:9,color:active?p.accent:"#444",textAlign:"center",lineHeight:1.2}}>{p.label}</span>
                </button>
              );
            })}
          </div>
        </div>
        {palette.label&&(
          <div style={{marginTop:12,padding:"10px 12px",background:"#1A1A1A",borderRadius:10,border:`1px solid ${palette.accent}44`,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
            <div style={{width:28,height:28,borderRadius:6,background:palette.bg,border:`2px solid ${palette.accent}`,flexShrink:0}}/>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:700,color:palette.accent}}>{palette.label}</div>
              <div style={{fontSize:10,color:"#444"}}>{palette.family}</div>
            </div>
            <div style={{display:"flex",gap:4}}>
              {[palette.bg,palette.surface,palette.accent].map((c,i)=>(
                <div key={i} style={{width:16,height:16,borderRadius:4,background:c,border:"1px solid #333"}}/>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const [activeProfile,setActiveProfile]=useState(()=>LS.get("abdfit_activeProfile","miovida"));
  const [tab,setTab]=useState("seance");
  const [workout,setWorkout]=useState(null);
  const [logoTaps,setLogoTaps]=useState(0);
  const [showSecret,setShowSecret]=useState(false);
  const [palette,setPalette]=useState(()=>LS.get("abdfit_palette",BG_PRESETS[0]));
  const [showInstallBanner,setShowInstallBanner]=useState(false);
  const tapTimer=useRef();
  const profile=PROFILE_DEFS[activeProfile];
  const A=palette.accent;

  useEffect(()=>{
    if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
    const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone=window.matchMedia('(display-mode: standalone)').matches||navigator.standalone;
    if(isIOS&&!isStandalone&&!LS.get('abdfit_installDismissed',false)) setTimeout(()=>setShowInstallBanner(true),2000);
  },[]);

  const handleLogoTap=()=>{
    const next=logoTaps+1; setLogoTaps(next);
    clearTimeout(tapTimer.current);
    if(next>=5){setShowSecret(true);setLogoTaps(0);}
    else tapTimer.current=setTimeout(()=>setLogoTaps(0),1500);
  };

  const switchProfile=id=>{setActiveProfile(id);LS.set("abdfit_activeProfile",id);setTab("seance");setWorkout(null);};

  if(workout){
    return <Workout {...workout} palette={palette} onBack={()=>setWorkout(null)}/>;
  }

  return(
    <div style={{minHeight:"100vh",background:`radial-gradient(ellipse at top,${palette.top||"#2A1400"} 0%,${palette.bg} 55%)`}}>
      {/* Header */}
      <div style={{padding:"20px 18px 14px",borderBottom:`1px solid ${palette.border}`,background:`${palette.bg}CC`,position:"sticky",top:0,zIndex:100,backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",maxWidth:480,margin:"0 auto"}}>
          <div onClick={handleLogoTap} style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:900,lineHeight:1,cursor:"default",userSelect:"none",position:"relative"}}>
            <span style={{color:palette.text||"#FFF"}}>Abdella</span><span style={{color:A}}>Fit</span>
            {logoTaps>0&&logoTaps<5&&(
              <div style={{position:"absolute",top:-6,right:-10,width:16,height:16,borderRadius:"50%",background:A,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#000",fontWeight:700,fontFamily:"sans-serif"}}>{5-logoTaps}</div>
            )}
          </div>
          <button onClick={()=>setTab("profil")} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",borderRadius:20,background:`${profile.color}20`,border:`1px solid ${profile.color}55`,cursor:"pointer"}}>
            <span style={{fontSize:16}}>{profile.emoji}</span>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:700,color:profile.color}}>{profile.name}</span>
          </button>
        </div>
      </div>

      {/* Content */}
      <div style={{paddingTop:8}}>
        {tab==="seance"&&<SessionConfig profileId={activeProfile} palette={palette} onStart={(s,l,d)=>setWorkout({session:s,level:l,duration:d})}/>}
        {tab==="progression"&&(
          <div style={{padding:"16px 0 0"}}>
            <div style={{padding:"0 18px 14px",display:"flex",alignItems:"center",gap:10,maxWidth:480,margin:"0 auto"}}>
              <span style={{fontSize:22}}>{profile.emoji}</span>
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:profile.color}}>{profile.name}</div>
                <div style={{fontSize:11,color:"#555"}}>Suivi du poids</div>
              </div>
            </div>
            <Progression profileId={activeProfile} palette={palette}/>
          </div>
        )}
        {tab==="profil"&&<ProfilScreen activeProfile={activeProfile} onSwitch={switchProfile} palette={palette}/>}
      </div>

      <BottomNav tab={tab} setTab={setTab} accent={A} bg={palette.bg}/>

      {/* iOS install banner */}
      {showInstallBanner&&(
        <div style={{position:"fixed",bottom:72,left:16,right:16,zIndex:300,background:"#1A1A1A",border:`1px solid ${A}55`,borderRadius:16,padding:"16px",boxShadow:"0 8px 32px #00000088"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:2,color:A}}>📲 INSTALLER L'APP</div>
            <button onClick={()=>{setShowInstallBanner(false);LS.set('abdfit_installDismissed',true);}} style={{background:"transparent",border:"none",color:"#555",cursor:"pointer",fontSize:18}}>×</button>
          </div>
          <div style={{fontSize:12,color:"#666",lineHeight:1.7}}>
            Tap <strong style={{color:"#FFF"}}>Partager</strong> → <strong style={{color:"#FFF"}}>"Sur l'écran d'accueil"</strong>
          </div>
        </div>
      )}

      {showSecret&&<SecretPanel onClose={()=>setShowSecret(false)} palette={palette} setPalette={setPalette}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
