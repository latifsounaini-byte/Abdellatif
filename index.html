function buildProgram(session, level, duration){
  const bank=BANK[session];
  const cfg={
    45: {warmup:5,  cN:2,cS:3,iN:1,iS:2,fin:false,finMin:0},
    60: {warmup:8,  cN:2,cS:3,iN:2,iS:2,fin:true, finMin:8},
    90: {warmup:10, cN:3,cS:4,iN:2,iS:3,fin:true, finMin:12},
    120:{warmup:10, cN:3,cS:4,iN:3,iS:3,fin:true, finMin:18},
  }[duration];
  const rep={
    debutant:     {c:"12–15",i:"15–20",rc:75, ri:45},
    intermediaire:{c:"8–12", i:"12–15",rc:90, ri:60},
    expert:       {c:"5–8",  i:"10–12",rc:120,ri:75},
  }[level];
  const phases=[];
  phases.push({name:"ÉCHAUFFEMENT",dur:`${cfg.warmup} min`,exs:[{
    name:"Cardio léger + mobilité",sets:1,reps:`${cfg.warmup} min`,rest:0,isSimple:true,
    tip:level==="debutant"?"Vélo ou marche rapide, FC 110–120 bpm":level==="intermediaire"?"Rameur, FC 120–130 bpm + mobilité":"Rameur intensité progressive + activation"
  }]});
  phases.push({
    name:"COMPOUND",dur:`~${Math.round(cfg.cN*cfg.cS*(rep.rc/60+1))} min`,
    exs:bank.compound[level].slice(0,cfg.cN).map(e=>({...e,sets:cfg.cS,reps:rep.c,rest:rep.rc}))
  });
  phases.push({
    name:"ISOLATION",dur:`~${Math.round(cfg.iN*cfg.iS*(rep.ri/60+0.75))} min`,
    exs:bank.isolation[level].slice(0,cfg.iN).map(e=>({...e,sets:cfg.iS,reps:rep.i,rest:rep.ri}))
  });
  if(cfg.fin){
    const f=bank.finisher[level];
    phases.push({name:"FINISHER",dur:`${cfg.finMin} min`,exs:[{name:f.name,tip:f.tip,sets:1,reps:`${cfg.finMin} min`,rest:0,isSimple:true}]});
  }
  return phases;
}

// ─── REST TIMER (FORGE STYLE) ─────────────────────────────────────────────────
function RestTimer({seconds, onDone, a}){
  const endRef=useRef(Date.now()+seconds*1000);
  const [left,setLeft]=useState(seconds);
  const t=useRef();
  const tick=useCallback(()=>{
    const rem=Math.max(0,Math.ceil((endRef.current-Date.now())/1000));
    setLeft(rem);
    if(rem<=0){onDone();return;}
    t.current=setTimeout(tick,250);
  },[onDone]);
  useEffect(()=>{
    t.current=setTimeout(tick,100);
    const f=()=>{if(!document.hidden){clearTimeout(t.current);tick();}};
    document.addEventListener('visibilitychange',f);
    return()=>{clearTimeout(t.current);document.removeEventListener('visibilitychange',f);};
  },[tick]);
  const pct=(seconds-left)/seconds;
  const red=left<=3&&left>0;
  const col=red?"#FF2020":a;
  return(
    <div style={{marginTop:12,background:"#111",borderLeft:`3px solid ${col}`,padding:"10px 14px",display:"flex",alignItems:"center",gap:12}}>
      {/* Big countdown number */}
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:42,lineHeight:1,color:col,minWidth:60}}>{left}</div>
      <div style={{flex:1}}>
        <div style={{fontSize:9,letterSpacing:3,color:"#444",marginBottom:6}}>RÉCUPÉRATION</div>
        <div style={{height:4,background:"#1A1A1A",borderRadius:0}}>
          <div style={{height:"100%",width:`${pct*100}%`,background:col,transition:"width 0.25s linear"}}/>
        </div>
      </div>
      <button onClick={onDone} style={{background:"transparent",border:"1px solid #333",color:"#555",padding:"4px 10px",cursor:"pointer",fontSize:11,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}}>SKIP</button>
    </div>
  );
}

// ─── WEIGHT CHART ─────────────────────────────────────────────────────────────
function WeightChart({entries, goal, color}){
  if(!entries||entries.length===0) return(
    <div style={{textAlign:"center",padding:"32px 0",color:"#333",fontSize:12,fontFamily:"'DM Sans'"}}>
      Aucune donnée encore.
    </div>
  );
  const W=320,H=140,pL=36,pR=16,pT=12,pB=24;
  const sorted=[...entries].sort((a,b)=>a.date.localeCompare(b.date));
  const ws=sorted.map(e=>e.weight);
  const allW=[...ws,goal];
  const minW=Math.floor(Math.min(...allW)-1),maxW=Math.ceil(Math.max(...allW)+1);
  const xs=i=>sorted.length===1?pL+(W-pL-pR)/2:pL+(W-pL-pR)*(i/(sorted.length-1));
  const ys=w=>pT+(H-pT-pB)*(1-(w-minW)/(maxW-minW));
  const gy=ys(goal);
  const pts=sorted.map((e,i)=>({x:xs(i),y:ys(e.weight),w:e.weight,d:e.date}));
  const pd=pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const fd=d=>{const p=d.split("-");return`${p[2]}/${p[1]}`;};
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
      <defs><linearGradient id="gc" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color}/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      {[minW,Math.round((minW+maxW)/2),maxW].map(t=>(
        <g key={t}>
          <line x1={pL} y1={ys(t)} x2={W-pR} y2={ys(t)} stroke="#1A1A1A" strokeWidth={1}/>
          <text x={pL-4} y={ys(t)+4} textAnchor="end" style={{fontSize:8,fill:"#444",fontFamily:"'DM Sans'"}}>{t}</text>
        </g>
      ))}
      <line x1={pL} y1={gy} x2={W-pR} y2={gy} stroke={color} strokeWidth={1} strokeDasharray="4,3" opacity={0.5}/>
      <text x={W-pR+3} y={gy+4} style={{fontSize:8,fill:color,fontFamily:"'DM Sans'"}}>Obj</text>
      {pts.length>1&&<path d={`${pd} L${pts[pts.length-1].x},${H-pB} L${pts[0].x},${H-pB} Z`} fill="url(#gc)" opacity={0.12}/>}
      {pts.length>1&&<path d={pd} fill="none" stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"/>}
      {pts.map((p,i)=>(
        <g key={i}>
          <circle cx={p.x} cy={p.y} r={4} fill="#0A0A0A" stroke={color} strokeWidth={2}/>
          <text x={p.x} y={p.y-8} textAnchor="middle" style={{fontSize:8,fill:"#666",fontFamily:"'DM Sans'"}}>{p.w}</text>
          {(i===0||i===pts.length-1||pts.length<=4)&&<text x={p.x} y={H-pB+12} textAnchor="middle" style={{fontSize:7,fill:"#333",fontFamily:"'DM Sans'"}}>{fd(p.d)}</text>}
        </g>
      ))}
    </svg>
  );
}

// ─── PROGRESSION ──────────────────────────────────────────────────────────────
function Progression({profileId, pal}){
  const def=PROFILES[profileId];
  const sKey=`af_prog_${profileId}`, cKey=`af_cfg_${profileId}`;
  const [entries,setEntries]=useState(()=>LS.get(sKey,[]));
  const [cfg,setCfg]=useState(()=>LS.get(cKey,{goal:def.defaultGoal}));
  const [nW,setNW]=useState(""),  [nD,setND]=useState(()=>new Date().toISOString().split("T")[0]);
  const [editG,setEditG]=useState(false), [gIn,setGIn]=useState(String(cfg.goal||def.defaultGoal));
  const A=pal.a;
  const save=e=>{setEntries(e);LS.set(sKey,e);};
  const add=()=>{const w=parseFloat(nW);if(isNaN(w)||w<20||w>300)return;save([...entries.filter(e=>e.date!==nD),{date:nD,weight:w}]);setNW("");};
  const del=d=>save(entries.filter(e=>e.date!==d));
  const saveG=()=>{const g=parseFloat(gIn);if(isNaN(g))return;const nc={...cfg,goal:g};setCfg(nc);LS.set(cKey,nc);setEditG(false);};
  const sorted=[...entries].sort((a,b)=>b.date.localeCompare(a.date));
  const latest=sorted[0];
  const first=entries.length>0?[...entries].sort((a,b)=>a.date.localeCompare(b.date))[0]:null;
  const diff=latest&&first?+(latest.weight-first.weight).toFixed(1):null;
  const toGoal=latest?(+(latest.weight-(cfg.goal||def.defaultGoal)).toFixed(1)):null;
  return(
    <div style={{padding:"0 16px 40px",maxWidth:480,margin:"0 auto"}}>
      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:1,marginBottom:20,border:`1px solid #1A1A1A`}} className="su">
        {[
          {l:"ACTUEL",  v:latest?`${latest.weight}kg`:"—",  c:A},
          {l:"ÉCART",   v:diff!==null?(diff>0?`+${diff}`:diff)+"kg":"—", c:diff!==null&&diff<0?"#60FF80":diff>0?"#FF4040":"#555"},
          {l:"OBJECTIF",v:`${cfg.goal||def.defaultGoal}kg`, c:"#888"},
        ].map(s=>(
          <div key={s.l} style={{background:"#111",padding:"14px 10px",textAlign:"center",borderRight:"1px solid #1A1A1A"}}>
            <div style={{fontSize:8,letterSpacing:3,color:"#333",marginBottom:6}}>{s.l}</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:s.c,letterSpacing:1}}>{s.v}</div>
          </div>
        ))}
      </div>

      {/* Goal edit */}
      <div style={{marginBottom:16,display:"flex",alignItems:"center",gap:8}} className="su">
        {editG?(
          <>
            <input type="number" value={gIn} onChange={e=>setGIn(e.target.value)}
              style={{flex:1,background:"#111",border:`1px solid ${A}`,padding:"8px 10px",color:"#FFF",fontSize:13,fontFamily:"'DM Sans'"}}/>
            <button onClick={saveG} style={{padding:"8px 14px",background:A,border:"none",color:"#000",fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:1,cursor:"pointer"}}>OK</button>
            <button onClick={()=>setEditG(false)} style={{padding:"8px 10px",background:"transparent",border:"1px solid #222",color:"#555",cursor:"pointer",fontSize:11}}>✕</button>
          </>
        ):(
          <button onClick={()=>setEditG(true)} style={{background:"transparent",border:`1px solid #222`,color:"#555",padding:"7px 12px",cursor:"pointer",fontSize:11,fontFamily:"'DM Sans'"}}>
            ✎ Objectif : {cfg.goal||def.defaultGoal}kg
          </button>
        )}
        {toGoal!==null&&<div style={{fontSize:11,color:"#444",marginLeft:"auto"}}>{toGoal>0?`−${toGoal}kg restants`:"🎯 Atteint !"}</div>}
      </div>

      {/* Chart */}
      <div style={{background:"#111",border:"1px solid #1A1A1A",padding:"16px",marginBottom:16}} className="su">
        <div style={{fontSize:9,letterSpacing:3,color:"#333",marginBottom:12}}>COURBE DE POIDS</div>
        <WeightChart entries={entries} goal={cfg.goal||def.defaultGoal} color={def.color}/>
      </div>

      {/* Add */}
      <div style={{background:"#111",border:"1px solid #1A1A1A",padding:"14px",marginBottom:16}} className="su">
        <div style={{fontSize:9,letterSpacing:3,color:"#333",marginBottom:10}}>AJOUTER</div>
        <div style={{display:"flex",gap:6}}>
          <input type="date" value={nD} onChange={e=>setND(e.target.value)}
            style={{flex:1,background:"#0A0A0A",border:"1px solid #1A1A1A",padding:"9px 8px",color:"#FFF",fontSize:12,fontFamily:"'DM Sans'"}}/>
          <input type="number" placeholder="kg" value={nW} onChange={e=>setNW(e.target.value)}
            style={{width:70,background:"#0A0A0A",border:"1px solid #1A1A1A",padding:"9px 8px",color:"#FFF",fontSize:14,textAlign:"center",fontFamily:"'DM Sans'"}}/>
          <button onClick={add} style={{padding:"9px 16px",background:A,border:"none",color:"#000",fontFamily:"'Bebas Neue',sans-serif",fontSize:18,cursor:"pointer"}}>+</button>
        </div>
      </div>

      {/* History */}
      {sorted.length>0&&(
        <div style={{background:"#111",border:"1px solid #1A1A1A",padding:"14px"}} className="su">
          <div style={{fontSize:9,letterSpacing:3,color:"#333",marginBottom:10}}>HISTORIQUE</div>
          {sorted.slice(0,10).map((e,i)=>(
            <div key={e.date} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:i<sorted.length-1?"1px solid #141414":"none"}}>
              <div style={{fontSize:11,color:"#444",fontFamily:"'DM Sans'"}}>{new Date(e.date+"T12:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"})}</div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:A,letterSpacing:1}}>{e.weight} kg</div>
              <button onClick={()=>del(e.date)} style={{background:"transparent",border:"none",color:"#333",cursor:"pointer",fontSize:16,padding:"0 4px"}}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── WORKOUT ──────────────────────────────────────────────────────────────────
function Workout({session, level, duration, onBack, pal}){
  const [elapsed,setElapsed]=useState(0);
  const [running,setRunning]=useState(false);
  const startRef=useRef(null), savedRef=useRef(0), ivRef=useRef(), wlRef=useRef(null);
  const A=pal.a;

  const reqWL=async()=>{try{if('wakeLock' in navigator)wlRef.current=await navigator.wakeLock.request('screen');}catch(e){}};
  const relWL=()=>{try{if(wlRef.current){wlRef.current.release();wlRef.current=null;}}catch(e){}};
  useEffect(()=>{
    const f=()=>{if(!document.hidden&&running)reqWL();};
    document.addEventListener('visibilitychange',f);
    return()=>{document.removeEventListener('visibilitychange',f);relWL();};
  },[running]);

  const toggle=()=>{
    setRunning(p=>{
      const n=!p;
      if(n){startRef.current=Date.now()-savedRef.current*1000;reqWL();}
      else{savedRef.current=elapsed;clearInterval(ivRef.current);relWL();}
      return n;
    });
  };
  useEffect(()=>{
    if(!running)return;
    ivRef.current=setInterval(()=>setElapsed(Math.floor((Date.now()-startRef.current)/1000)),500);
    const f=()=>{if(!document.hidden&&startRef.current)setElapsed(Math.floor((Date.now()-startRef.current)/1000));};
    document.addEventListener('visibilitychange',f);
    return()=>{clearInterval(ivRef.current);document.removeEventListener('visibilitychange',f);};
  },[running]);

  const phases=useMemo(()=>buildProgram(session,level,duration),[session,level,duration]);
  const fmt=s=>`${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor((s%3600)/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  return(
    <div style={{minHeight:"100vh",background:pal.bg,paddingBottom:80}}>
      {/* Sticky header */}
      <div style={{position:"sticky",top:0,zIndex:100,background:pal.bg,borderBottom:`1px solid #1A1A1A`,padding:"12px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,maxWidth:480,margin:"0 auto"}}>
          <button onClick={onBack} style={{background:"transparent",border:"1px solid #222",color:"#555",padding:"5px 10px",cursor:"pointer",fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:1}}>← RETOUR</button>
          <div style={{flex:1}}>
            {/* Accent bar */}
            <div style={{height:2,width:32,background:A,marginBottom:4}}/>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:2,color:pal.t||"#FFF",lineHeight:1}}>{SESSIONS[session].label}</div>
            <div style={{fontSize:10,color:"#444",letterSpacing:1}}>{LEVELS.find(l=>l.key===level).label} · {duration} MIN</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:2,color:running?A:"#333",fontFamily:"monospace"}}>{fmt(elapsed)}</div>
            <button onClick={toggle} style={{background:running?A:"transparent",border:`1px solid ${running?A:"#222"}`,color:running?"#000":"#555",padding:"3px 10px",cursor:"pointer",fontFamily:"'Bebas Neue',sans-serif",fontSize:12,letterSpacing:1,transition:"all 0.2s"}}>{running?"⏸ PAUSE":"▶ START"}</button>
          </div>
        </div>
      </div>

      {/* Phases */}
      <div style={{padding:"16px",maxWidth:480,margin:"0 auto"}}>
        {phases.map((phase,pi)=>(
          <div key={pi} style={{marginBottom:28}} className="su">
            {/* Phase header */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:11,letterSpacing:4,color:A}}>{phase.name}</div>
              <div style={{flex:1,height:1,background:"#1A1A1A"}}/>
              <div style={{fontSize:10,color:"#333"}}>{phase.dur}</div>
            </div>
            {phase.exs.map((ex,ei)=><ExCard key={`${pi}-${ei}`} ex={ex} a={A} s={pal.s} b={pal.b}/>)}
          </div>
        ))}

        {/* Nutrition note */}
        <div style={{borderLeft:`3px solid ${A}`,paddingLeft:12,marginTop:8}}>
          <div style={{fontSize:9,letterSpacing:3,color:A,marginBottom:4}}>NUTRITION</div>
          <div style={{fontSize:12,color:"#555",lineHeight:1.6}}>
            {level==="debutant"?"1.6–1.8g de protéines/kg. Progression avant restriction calorique.":level==="intermediaire"?"−350 kcal/jour. 1.8–2g de protéines/kg. Augmente les charges en priorité.":"Maintien calorique ±100 kcal + 2–2.2g protéines/kg. Cycle carbs autour des séances."}
          </div>
        </div>
      </div>
    </div>
  );
}

      <div style={{marginTop:24,borderLeft:`3px solid ${pal.a}`,paddingLeft:12}} className="su">
        <div style={{fontSize:9,letterSpacing:3,color:pal.a,marginBottom:4}}>INFO</div>
        <div style={{fontSize:11,color:"#444",lineHeight:1.7}}>Chaque profil a son propre historique de poids et ses préférences. Données sauvegardées sur cet appareil.</div>
      </div>
    </div>
  );
}

// ─── BOTTOM NAV ───────────────────────────────────────────────────────────────
function Nav({tab, setTab, a, bg}){
  const items=[
    {key:"seance",     label:"SÉANCE",icon:"🏋"},
    {key:"progression",label:"POIDS", icon:"📈"},
    {key:"profil",     label:"PROFIL",icon:"👤"},
  ];
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:200,background:`${bg}F8`,borderTop:"1px solid #1A1A1A",display:"flex",backdropFilter:"blur(10px)",WebkitBackdropFilter:"blur(10px)"}}>
      {items.map(it=>{
        const active=tab===it.key;
        return(
          <button key={it.key} onClick={()=>setTab(it.key)} style={{flex:1,padding:"10px 4px 14px",background:"transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <span style={{fontSize:18,opacity:active?1:0.3}}>{it.icon}</span>
            <span style={{fontSize:9,letterSpacing:2,color:active?a:"#333",fontFamily:"'Bebas Neue',sans-serif",fontWeight:active?700:400}}>{it.label}</span>
            {active&&<div style={{width:20,height:2,background:a}}/>}
          </button>
        );
      })}
    </div>
  );
}

// ─── SECRET PANEL ─────────────────────────────────────────────────────────────
function SecretPanel({onClose, pal, setPal}){
  const [fam,setFam]=useState("Tous");
  const filtered=fam==="Tous"?PALETTES:PALETTES.filter(p=>p.family===fam);
  const pick=p=>{setPal(p);LS.set("af_pal",p);};
  return(
    <div style={{position:"fixed",inset:0,zIndex:999,display:"flex",alignItems:"flex-end",background:"#00000099"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",background:"#0F0F0F",border:"1px solid #1A1A1A",borderRadius:"12px 12px 0 0",padding:"18px 14px 32px",animation:"slideUp 0.3s ease",maxHeight:"78vh",display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexShrink:0}}>
          <div>
            <div style={{height:2,width:24,background:pal.a,marginBottom:6}}/>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:3,color:pal.a}}>APPARENCE</div>
            <div style={{fontSize:10,color:"#333"}}>5 taps sur le logo · {PALETTES.length} palettes</div>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"1px solid #1A1A1A",color:"#444",padding:"5px 10px",cursor:"pointer",fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:1}}>FERMER</button>
        </div>
        <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:10,marginBottom:10,flexShrink:0}}>
          {["Tous",...FAM].map(f=>(
            <button key={f} onClick={()=>setFam(f)} style={{flexShrink:0,padding:"4px 10px",cursor:"pointer",background:fam===f?pal.a:"transparent",border:`1px solid ${fam===f?pal.a:"#1A1A1A"}`,color:fam===f?"#000":"#444",fontSize:9,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1,transition:"all 0.2s"}}>{f}</button>
          ))}
        </div>
        <div style={{overflowY:"auto",flex:1}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
            {filtered.map(p=>{
              const active=pal.label===p.label;
              return(
                <button key={p.label} onClick={()=>pick(p)} style={{padding:"8px 4px 6px",cursor:"pointer",border:`2px solid ${active?p.a:"#1A1A1A"}`,background:"transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"all 0.2s"}}>
                  <div style={{width:44,height:40,background:p.bg,border:`1px solid ${p.b}`,overflow:"hidden",position:"relative",boxShadow:active?`0 0 8px ${p.a}55`:"none"}}>
                    <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:p.a}}/>
                    <div style={{padding:"6px 5px 0"}}>
                      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,color:p.t||"#FFF",letterSpacing:1,lineHeight:1}}>PUSH</div>
                      <div style={{height:1,width:"60%",background:p.a,marginTop:3}}/>
                    </div>
                  </div>
                  <span style={{fontSize:9,color:active?p.a:"#333",letterSpacing:0.5,fontFamily:"'DM Sans'"}}>{p.label}</span>
                </button>
              );
            })}
          </div>
        </div>
        {pal.label&&(
          <div style={{marginTop:10,padding:"8px 10px",borderLeft:`3px solid ${pal.a}`,flexShrink:0}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:2,color:pal.a}}>{pal.label}</div>
            <div style={{fontSize:9,color:"#444"}}>{pal.family}</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [profile,setProfile]=useState(()=>LS.get("af_profile","miovida"));
  const [tab,setTab]=useState("seance");
  const [workout,setWorkout]=useState(null);
  const [taps,setTaps]=useState(0);
  const [secret,setSecret]=useState(false);
  const [pal,setPal]=useState(()=>LS.get("af_pal",PALETTES[0]));
  const [installBanner,setInstallBanner]=useState(false);
  const tapTimer=useRef();
  const P=PROFILES[profile];
  const A=pal.a;

  useEffect(()=>{
    if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
    const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone=window.matchMedia('(display-mode: standalone)').matches||navigator.standalone;
    if(isIOS&&!isStandalone&&!LS.get('af_install',false)) setTimeout(()=>setInstallBanner(true),2000);
  },[]);

  const logoTap=()=>{
    const n=taps+1; setTaps(n); clearTimeout(tapTimer.current);
    if(n>=5){setSecret(true);setTaps(0);}
    else tapTimer.current=setTimeout(()=>setTaps(0),1500);
  };

  const switchProfile=id=>{setProfile(id);LS.set("af_profile",id);setTab("seance");setWorkout(null);};

  if(workout) return <Workout {...workout} pal={pal} onBack={()=>setWorkout(null)}/>;

  return(
    <div style={{minHeight:"100vh",background:pal.bg}}>
      {/* HEADER — FORGE STYLE */}
      <div style={{background:pal.bg,borderBottom:"1px solid #1A1A1A",padding:"16px 16px 12px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",maxWidth:480,margin:"0 auto"}}>
          {/* Logo */}
          <div onClick={logoTap} style={{cursor:"default",userSelect:"none",position:"relative"}}>
            <div style={{height:2,width:32,background:A,marginBottom:5}}/>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:4,lineHeight:1,color:pal.t||"#FFF"}}>
              ABDELLA<span style={{color:A}}>FIT</span>
            </div>
            {taps>0&&taps<5&&(
              <div style={{position:"absolute",top:-4,right:-10,width:14,height:14,background:A,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#000",fontWeight:700,fontFamily:"'DM Sans'"}}>{5-taps}</div>
            )}
          </div>
          {/* Profile pill */}
          <button onClick={()=>setTab("profil")} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",border:`1px solid ${P.color}44`,background:`${P.color}14`,cursor:"pointer"}}>
            <span style={{fontSize:14}}>{P.emoji}</span>
            <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:2,color:P.color}}>{P.name.toUpperCase()}</span>
          </button>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{paddingTop:8}}>
        {tab==="seance"&&<SessionConfig profileId={profile} pal={pal} onStart={(s,l,d)=>setWorkout({session:s,level:l,duration:d})}/>}
        {tab==="progression"&&(
          <div style={{paddingTop:16}}>
            <div style={{padding:"0 16px 14px",maxWidth:480,margin:"0 auto"}}>
              <div style={{height:2,width:24,background:P.color,marginBottom:5}}/>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:2,color:P.color}}>{P.name.toUpperCase()}</div>
              <div style={{fontSize:10,color:"#444",letterSpacing:1}}>SUIVI DU POIDS</div>
            </div>
            <Progression profileId={profile} pal={pal}/>
          </div>
        )}
        {tab==="profil"&&<ProfilScreen activeProfile={profile} onSwitch={switchProfile} pal={pal}/>}
      </div>

      <Nav tab={tab} setTab={setTab} a={A} bg={pal.bg}/>

      {/* iOS install banner */}
      {installBanner&&(
        <div style={{position:"fixed",bottom:70,left:12,right:12,zIndex:300,background:"#111",border:`1px solid ${A}44`,padding:"14px",boxShadow:"0 4px 24px #00000088"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:2,color:A}}>📲 INSTALLER L'APP</div>
            <button onClick={()=>{setInstallBanner(false);LS.set('af_install',true);}} style={{background:"transparent",border:"none",color:"#444",cursor:"pointer",fontSize:16}}>×</button>
          </div>
          <div style={{fontSize:11,color:"#555",lineHeight:1.6}}>Tap <strong style={{color:"#FFF"}}>Partager ⬆</strong> → <strong style={{color:"#FFF"}}>"Sur l'écran d'accueil"</strong></div>
        </div>
      )}

      {secret&&<SecretPanel onClose={()=>setSecret(false)} pal={pal} setPal={p=>{setPal(p);LS.set("af_pal",p);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
